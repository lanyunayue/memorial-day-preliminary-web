}

.toast-icon { font-size: 16px; flex-shrink: 0; }

/* ========== Bottom Tab (mobile) ========== */

/* ========== Responsive: Tablet ========== */
@media (max-width: 900px) {

  if (title.length > 16) title = title.substring(0, 16);
  return title || (kw || '事项');
}

function daysUntil(dateStr) {
  if (!dateStr) return 999;
  var parts = dateStr.split('-'); if (parts.length<3) return 999;
  var d = new Date(+parts[0],+parts[1]-1,+parts[2]);
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function daysUntilLabel(dateStr) {
  var d = daysUntil(dateStr);
  if (d<0) return '已逾期';
  if (d===0) return '今天';
  if (d===1) return '明天';
  if (d===2) return '后天';
  if (d<=7) return d+'天后';
  return d+'天后';
}
function formatDateLabel(dateStr) {
  if (!dateStr) return '待设定';
  var d = daysUntil(dateStr);
  if (d===0) return '今天';
  if (d===1) return '明天';
  if (d===2) return '后天';
  var parts = dateStr.split('-');
  if (parts.length===3) return parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
  return dateStr;
}
function formatTimeLabel(timeStr) {
  if (!timeStr) return '';
  return timeStr;
}

function getGreeting() {
  var now = new Date();
  var hour = now.getHours();
  var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  var wd = weekdays[now.getDay()];
  var m = now.getMonth()+1, d = now.getDate();
  var period;
  if (hour < 6) period = '凌晨好';
  else if (hour < 9) period = '早上好';
  else if (hour < 12) period = '上午好';
  else if (hour < 14) period = '中午好';
  else if (hour < 18) period = '下午好';
  else period = '晚上好';
  return wd+'，'+m+'月'+d+'日 · '+period;
}

function renderToday() {
  var active = appState.activeView==='today' ? ' active' : '';
  var all = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id);});
  var overdue = all.filter(function(r){return daysUntil(r.date)<0;});
  var todayItems = all.filter(function(r){return daysUntil(r.date)===0;});
  var upcoming = all.filter(function(r){var d=daysUntil(r.date);return d>=1&&d<=3;})
    .sort(function(a,b){return daysUntil(a.date)-daysUntil(b.date);});

  var sc = SCENARIOS.find(function(x){return x.id===appState.scenario;});
  var scName = sc ? sc.name : '学生';

  var html = '<div class="view'+active+'" id="view-today">';

  // Greeting
  html += '<div class="greeting">';
  html += '<span>'+esc(getGreeting())+'</span>';
  html += '<span class="scenario-label">'+esc(scName)+'</span>';
  html += '</div>';

  // Quick add bar
  html += '<div class="quick-add" id="quickAdd">';
  html += '<div class="quick-add-row">';
  html += '<input type="text" class="quick-add-input" id="quickAddInput" placeholder="把一句安排、通知内容或截止时间丢给我，例如：明天下午3点在B205开班会" autocomplete="off">';
  html += '<div class="quick-add-actions">';
  var micCls = voiceSupported ? '' : ' disabled';
  var micTitle = voiceSupported ? '语音输入' : '当前浏览器不支持语音识别';
  html += '<button class="quick-add-btn mic'+micCls+'" id="quickMicBtn" onclick="toggleQuickVoice(event)" title="'+micTitle+'">🎤</button>';
  html += '<button class="quick-add-btn import" onclick="switchView(\'inbox\')">导入通知</button>';
  html += '<button class="quick-add-btn" style="background:var(--accent);color:#fff;" onclick="quickAddParse()">+ 添加</button>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // Draft preview
  if (quickDraft) {
    html += renderQuickDraft();
  }

  // Today's items (overdue first, then today)
  var todayAll = overdue.concat(todayItems);
  html += '<div class="section-head"><div class="section-title">今天事项<span class="section-count">'+todayAll.length+'</span></div></div>';
  if (todayAll.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">今天没有安排，在上方输入框快速添加一条吧</div></div>';
  } else {
    html += '<div class="task-list">';
    // Sort overdue by date (oldest first), then today by time
    todayAll.sort(function(a,b){
      var da = daysUntil(a.date), db = daysUntil(b.date);
      if (da !== db) return da - db;
      if (a.time && b.time) return a.time.localeCompare(b.time);
      if (a.time) return -1;
      if (b.time) return 1;
      return 0;
    });
    for (var i=0;i<todayAll.length;i++) {
      html += renderTaskItem(todayAll[i]);
    }
    html += '</div>';
  }

  // Upcoming (3 days)
  if (upcoming.length > 0) {
    html += '<div class="section-head"><div class="section-title">快截止<span class="section-count">'+upcoming.length+'</span></div></div>';
    html += '<div class="task-list">';
    for (var j=0;j<Math.min(upcoming.length,5);j++) {
      html += renderTaskItem(upcoming[j]);
    }
    html += '</div>';
  }

  // Agent suggestion
  html += renderAgentSuggest(overdue, todayItems, upcoming);

  html += '</div>';
  return html;
}

function renderTaskItem(r) {
  var d = daysUntil(r.date);
  var completed = appState.completedIds.indexOf(r.id) !== -1;
  var cls = 'task-item';
  if (completed) cls += ' completed';
  if (d < 0) cls += ' overdue';
  else if (d <= 3 && r.riskLevel==='high') cls += ' urgent';

  var riskCls = r.riskLevel==='high'?'tag-high':r.riskLevel==='mid'?'tag-mid':'tag-low';
  var riskLabel = r.riskLevel==='high'?'高':r.riskLevel==='mid'?'中':'普通';

  var timeCls = '';
  if (d<0) timeCls = ' overdue';
  else if (d>=1 && d<=3 && r.riskLevel==='high') timeCls = ' upcoming';

  var timeDisplay = '';
  if (d<0) timeDisplay = '已逾期';
  else if (d===0) timeDisplay = r.time || '今天';
  else timeDisplay = formatDateLabel(r.date) + (r.time?' '+r.time:'');

  var html = '<div class="'+cls+'" onclick="openDrawer(\''+r.id+'\')">';
  html += '<div class="task-check" onclick="event.stopPropagation();toggleComplete(\''+r.id+'\')">✓</div>';
  html += '<div class="task-body">';
  html += '<div class="task-title">'+esc(r.title)+'</div>';
  html += '<div class="task-meta">';
  html += '<span class="task-time'+timeCls+'">'+esc(timeDisplay)+'</span>';
  if (r.location) html += '<span>· '+esc(r.location)+'</span>';
  html += '<span class="tag '+riskCls+'">'+riskLabel+'</span>';
  html += '</div></div></div>';
  return html;
}

function renderAgentSuggest(overdue, today, upcoming) {
  var html = '<div class="agent-suggest">';
  html += '<div class="agent-suggest-head"><div class="agent-suggest-icon">✦</div><div class="agent-suggest-title">Agent 建议</div></div>';
  var text = '';
  var total = overdue.length + today.length;
  if (overdue.length > 0) {
    text += '有 '+overdue.length+' 项已逾期，请优先处理。';
  }
  if (total > 0) {
    text += '今天有 '+total+' 件事';
    var firstUrgent = overdue[0] || today.find(function(r){return r.riskLevel==='high';});
    if (firstUrgent) text += '，建议先处理「'+firstUrgent.title+'」';
    text += '。';
  } else if (upcoming.length > 0) {
    text += '今天没有安排，可以提前准备'+upcoming[0].title+'。';
  } else {
    text += '目前没有待办事项，享受专注时光。';
  }
  html += '<div class="agent-suggest-text">'+esc(text)+'</div>';
  html += '</div>';
  return html;
}

function quickAddParse() {
  var input = document.getElementById('quickAddInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  var drafts = extractReminders(text, appState.identity, '快速添加');
  if (drafts.length === 0) {
    // Create a minimal draft even if parsing fails
    quickDraft = {
      id: uid(), title: text, date: '', time: '', location: '',
      category: '事项', riskLevel: detectPriority(text, 'mid'),
      source: '快速添加', sourceText: text
    };
  } else {
    var d = drafts[0];
    quickDraft = {
      id: d.id, title: d.title, date: d.date, time: d.time, location: d.location,
      category: d.category, riskLevel: d.riskLevel,
      source: '快速添加', sourceText: d.sourceText
    };
  }
  input.value = '';
  renderApp();
  // Focus on title
  setTimeout(function(){
    var titleInput = document.getElementById('draftTitle');
    if (titleInput) titleInput.focus();
  }, 50);
}

function saveQuickDraft(target) {
  if (!quickDraft) return;
  var titleEl = document.getElementById('draftTitle');
  var dateEl = document.getElementById('draftDate');
  var timeEl = document.getElementById('draftTime');
  var locEl = document.getElementById('draftLocation');
  var prioEl = document.getElementById('draftPriority');

  var title = titleEl ? titleEl.value.trim() : quickDraft.title;
  var dateText = dateEl ? dateEl.value.trim() : '';
  var timeText = timeEl ? timeEl.value.trim() : '';
  var locText = locEl ? locEl.value.trim() : '';
  var prio = prioEl ? prioEl.value : quickDraft.riskLevel;

  if (!title) { showToast('⚠','请输入标题'); return; }

  // Re-parse date if user changed it
  var parsedDate = '';
  if (dateText && dateText !== '待设定') {
    parsedDate = parseDate(dateText);
    if (!parsedDate && /^\d{4}-\d{2}-\d{2}$/.test(dateText)) parsedDate = dateText;
  }
  var parsedTime = parseTime(timeText) || timeText;

  var reminder = {
    id: uid(),
    title: title,
    date: parsedDate,
    time: parsedTime,
    location: locText,
    targetGroup: appState.identity || '个人',
    category: quickDraft.category || '事项',
    riskLevel: prio,
    reminderSuggestion: parsedDate ? ('提前 '+(prio==='high'?'3天':prio==='mid'?'1天':'当天')+'提醒') : '建议手动设置日期',
    preparation: PREP_MAP[prio] || PREP_MAP.mid,
    source: quickDraft.source || '快速添加',
    sourceText: quickDraft.sourceText || title,
    confidence: 0.8
  };
  appState.reminders.push(reminder);
  quickDraft = null;
  showToast('✓','已添加：'+title);
  if (target === 'list') appState.activeView = 'list';
  else appState.activeView = 'today';
  renderApp();
}

function cancelQuickDraft() {
  quickDraft = null;
  renderApp();
}

function bindQuickAddEvents() {
  var input = document.getElementById('quickAddInput');
  if (!input) return;
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      quickAddParse();
    }
  });
  // If quick draft exists and user is editing draft fields, Enter in fields can save
  var dTitle = document.getElementById('draftTitle');
  if (dTitle) {
    dTitle.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveQuickDraft('today'); }
    });
    dTitle.select();
  }
}

// ========== Voice (for quick add) ==========
function setupMicButton() {
  var btn = document.getElementById('quickMicBtn');
  if (!btn) return;
  if (!voiceSupported) {
    btn.classList.add('disabled');
    btn.disabled = true;
  } else {
    btn.classList.remove('disabled');
    btn.disabled = false;
  }
}
function resetVoiceState() {
  voiceListening = false;
  var btn = document.getElementById('quickMicBtn');
  if (btn) {
    btn.classList.remove('listening');
    btn.disabled = !voiceSupported;
    if (!voiceSupported) btn.classList.add('disabled');
    else btn.classList.remove('disabled');
  }
}
function toggleQuickVoice(e) {
  if (e) e.preventDefault();
  if (!voiceSupported) {
    showToast('⚠','当前浏览器不支持语音识别，推荐 Chrome/Edge + HTTPS');
    return;
  }
  var btn = document.getElementById('quickMicBtn');
  if (!btn) return;
  if (voiceListening) {
    try { voiceRecognition.stop(); } catch(err) {}
    resetVoiceState();
    return;
  }
  if (!voiceRecognition) {
    try {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SR();
      voiceRecognition.lang = 'zh-CN';
      voiceRecognition.continuous = false;
      voiceRecognition.interimResults = true;
      voiceRecognition.onstart = function() {
        voiceListening = true;
        var b = document.getElementById('quickMicBtn');
        if (b) b.classList.add('listening');
        var inp = document.getElementById('quickAddInput');
        if (inp) inp.placeholder = '正在聆听...';
      };
      voiceRecognition.onresult = function(ev) {
        var finalTranscript = '';
        for (var i = ev.resultIndex; i < ev.results.length; i++) {
          if (ev.results[i].isFinal) finalTranscript += ev.results[i][0].transcript;
        }
        var inp = document.getElementById('quickAddInput');
        if (inp && finalTranscript) {
          inp.value = (inp.value ? inp.value + ' ' : '') + finalTranscript;
          inp.focus();
        }
      };
      voiceRecognition.onend = function() { resetVoiceState(); var inp=document.getElementById('quickAddInput'); if(inp)inp.placeholder='把一句安排、通知内容或截止时间丢给我，例如：明天下午3点在B205开班会'; };
      voiceRecognition.onerror = function(ev) {
        resetVoiceState();
        var errMsg = '语音识别出错';
        if (ev && ev.error) {
          if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') errMsg = '麦克风权限未开启';
          else if (ev.error === 'no-speech') errMsg = '未检测到语音';
          else if (ev.error === 'network') errMsg = '语音识别需要网络连接';
        }
        showToast('⚠', errMsg);
      };
    } catch(err) {
      resetVoiceState();
      showToast('⚠','语音初始化失败');
      return;
    }
  }
  try {
    voiceRecognition.start();
    voiceListening = true;
    btn.classList.add('listening');
  } catch(err) {
    try { voiceRecognition.stop(); } catch(e) {}
    resetVoiceState();
    setTimeout(function(){
      try { voiceRecognition.start(); voiceListening = true; var b2=document.getElementById('quickMicBtn'); if(b2)b2.classList.add('listening'); } catch(e2) { resetVoiceState(); }
    }, 200);
  }
}

  var riskLabel = d.riskLevel==='high'?'高':d.riskLevel==='mid'?'中':'普通';
  var html = '<div class="'+cls+'">';
  html += '<input type="checkbox" class="inbox-draft-check" '+(d.selected?'checked':'')+' onchange="toggleInboxDraft('+idx+',this.checked)">';
  html += '<div class="inbox-draft-body">';
  html += '<input type="text" class="inbox-draft-title" value="'+esc(d.title)+'" onchange="inboxDrafts['+idx+'].title=this.value">';
  html += '<div class="inbox-draft-meta">';
  html += '<input type="text" value="'+esc(d.date||'待设定')+'" placeholder="日期" onchange="inboxDrafts['+idx+'].date=this.value" style="width:90px;">';
  html += '<input type="text" value="'+esc(d.time||'')+'" placeholder="时间" onchange="inboxDrafts['+idx+'].time=this.value" style="width:70px;">';
  html += '<input type="text" value="'+esc(d.location||'')+'" placeholder="地点" onchange="inboxDrafts['+idx+'].location=this.value" style="width:70px;">';
  html += '<select onchange="inboxDrafts['+idx+'].riskLevel=this.value" style="width:60px;">';
  html += '<option value="high"'+(d.riskLevel==='high'?' selected':'')+'>高</option>';
  html += '<option value="mid"'+(d.riskLevel==='mid'?' selected':'')+'>中</option>';
  html += '<option value="low"'+(d.riskLevel==='low'?' selected':'')+'>普通</option>';
  html += '</select>';
  html += '<span class="tag '+riskCls+'">'+riskLabel+'</span>';
  if (d.category) html += '<span class="tag tag-cat">'+esc(d.category)+'</span>';
  html += '</div></div></div>';
  return html;
}

function parseInboxText() {
  var ta = document.getElementById('inboxPasteArea');
  if (!ta) return;
  var text = ta.value.trim();
  if (!text) { showToast('⚠','请先粘贴通知文本或上传 TXT 文件'); return; }
  var identity = appState.identity || '学生';
  var drafts = extractReminders(text, identity, '文本粘贴');
  inboxDrafts = drafts;
  // Add to inbox history
  var notice = { id:uid(), title:'粘贴文本通知', source:'文本粘贴', publishTime:new Date().toLocaleString('zh-CN'), fileType:'TXT', status:'parsed', body:text, targetGroup:[] };
  appState.inbox.unshift(notice);
  var statusEl = document.getElementById('inboxUploadStatus');
  var relCount = drafts.filter(function(d){return d.selected;}).length;
  if (statusEl) statusEl.innerHTML = '<div class="upload-status ok">已解析出 '+drafts.length+' 条提醒，其中 '+relCount+' 条与你相关。</div>';
  showToast('✓','提取了 '+drafts.length+' 条，相关 '+relCount+' 条');
  renderApp();
  setTimeout(function(){
    var list = document.getElementById('inboxDraftsList');
    if (list) list.scrollIntoView({behavior:'smooth', block:'start'});
  },100);
}

function toggleInboxDraft(idx, checked) {
  inboxDrafts[idx].selected = checked;
  // Update count display without full re-render
  renderApp();
}
function selectAllInboxDrafts(onlyRelevant) {
  for (var i=0;i<inboxDrafts.length;i++) inboxDrafts[i].selected = onlyRelevant ? inboxDrafts[i].relevant : true;
  renderApp();
}
function clearInboxDrafts() {
  inboxDrafts = [];
  var ta = document.getElementById('inboxPasteArea');
  if (ta) ta.value = '';
  var us = document.getElementById('inboxUploadStatus');
  if (us) us.innerHTML = '';
  renderApp();
}
function saveInboxDraftsTo(target) {
  var selected = inboxDrafts.filter(function(d){return d.selected;});
  if (selected.length===0) { showToast('⚠','请先勾选要保存的提醒'); return; }
  var count = 0;
  for (var i=0;i<selected.length;i++) {
    var d = selected[i];
    // Re-parse date if edited
    var parsedDate = d.date;
    if (d.date && d.date !== '待设定') {
      var tmp = parseDate(d.date);
      if (tmp) parsedDate = tmp;
      else if (!/^\d{4}-\d{2}-\d{2}$/.test(d.date)) parsedDate = '';
    }
    var parsedTime = d.time ? (parseTime(d.time)||d.time) : '';
    appState.reminders.push({
      id: uid(),
      title: d.title,
      date: parsedDate || '',
      time: parsedTime || '',
      location: d.location || '',
      targetGroup: d.targetGroup || appState.identity,
      category: d.category || '事项',
      riskLevel: d.riskLevel || 'mid',
      reminderSuggestion: parsedDate ? ('提前 '+(d.riskLevel==='high'?'3天':d.riskLevel==='mid'?'1天':'当天')+'提醒') : '建议手动设置日期',
      preparation: PREP_MAP[d.riskLevel] || PREP_MAP.mid,
      source: d.source || '收集箱',
      sourceText: d.sourceText || d.title,
      confidence: d.confidence || 0.7
    });
    count++;
  }
  inboxDrafts = [];
  var ta = document.getElementById('inboxPasteArea');
  if (ta) ta.value = '';
  showToast('✓','已保存 '+count+' 条提醒');
  appState.activeView = target;
  renderApp();
}

function bindInboxEvents() {
  // Paste area Ctrl+Enter
  var ta = document.getElementById('inboxPasteArea');
  if (ta) {
    ta.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        parseInboxText();
      }
    });
  }
}
function bindFileUpload() {
  var fi = document.getElementById('inboxFileInput');
  if (!fi) return;
  fi.addEventListener('change', function(e){
    var f = e.target.files[0];
    if (f) readInboxFile(f);
    fi.value = '';
  });
}
function readInboxFile(file) {
  var ext = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
  if (ext === '.txt' || file.type === 'text/plain' || ext === '') {
    var reader = new FileReader();
    reader.onload = function(e) {
      var text = e.target.result;
      var ta = document.getElementById('inboxPasteArea');
      if (ta) ta.value = text;
      var us = document.getElementById('inboxUploadStatus');
      if (us) us.innerHTML = '<div class="upload-status ok">已读取 TXT：'+esc(file.name)+'（'+text.length+' 字），点击"解析与我有关的提醒"。</div>';
      showToast('✓','TXT 已读取：'+file.name);
    };
    reader.onerror = function() { showToast('✗','文件读取失败'); };
    reader.readAsText(file, 'UTF-8');
  } else {
    var us = document.getElementById('inboxUploadStatus');
    if (us) us.innerHTML = '<div class="upload-status warn">当前版本支持 TXT 文件，其他格式后续完善。</div>';
    showToast('⚠','请上传 TXT 文件');
  }
}

// ========== Calendar View ==========
function renderCalendar() {
  var active = appState.activeView==='calendar'?' active':'';
  var html = '<div class="view'+active+'" id="view-calendar">';
  html += '<div class="cal-tabs">';
  var tabs = [{id:'today',l:'今天'},{id:'tomorrow',l:'明天'},{id:'week',l:'本周'},{id:'future',l:'未来'}];
  for (var i=0;i<tabs.length;i++) {
    html += '<div class="cal-tab'+(activeCalTab===tabs[i].id?' active':'')+'" onclick="activeCalTab=\''+tabs[i].id+'\';renderApp()">'+tabs[i].l+'</div>';
  }
  html += '</div>';

  var items = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id);});
  var groups = {};

  for (var j=0;j<items.length;j++) {
    var r = items[j];
    var d = daysUntil(r.date);
    var include = false;
    if (activeCalTab==='today') include = (d===0);
    else if (activeCalTab==='tomorrow') include = (d===1);
    else if (activeCalTab==='week') include = (d>=0 && d<=7);
    else if (activeCalTab==='future') include = (d>=0);
    if (include || d<0) {
      if (activeCalTab!=='future' && d<0 && activeCalTab==='today') include = true;
      var key = r.date || '待设定';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    }
  }

  // Sort: overdue first, then by date
  var keys = Object.keys(groups).sort(function(a,b){
    if (a==='待设定') return 1;
    if (b==='待设定') return -1;
    return a.localeCompare(b);
  });

  if (keys.length===0) {
    html += '<div class="empty-state"><div class="empty-icon">▦</div><div class="empty-text">当前视图没有事项</div></div>';
  } else {
    html += '<div class="timeline">';
    for (var k=0;k<keys.length;k++) {
      var key = keys[k];
      var dd = daysUntil(key);
      var tagHtml = '';
      if (dd<0) tagHtml = '<span class="timeline-date-tag" style="background:var(--danger-soft);color:var(--danger);">已逾期</span>';
      else if (dd===0) tagHtml = '<span class="timeline-date-tag">今天</span>';
      else if (dd===1) tagHtml = '<span class="timeline-date-tag">明天</span>';
      else if (dd===2) tagHtml = '<span class="timeline-date-tag">后天</span>';
      else if (dd<=7) tagHtml = '<span class="timeline-date-tag">'+dd+'天后</span>';
      html += '<div class="timeline-group"><div class="timeline-date">'+esc(key)+tagHtml+'</div>';
      var groupItems = groups[key].slice().sort(function(a,b){
        if (a.time && b.time) return a.time.localeCompare(b.time);
        if (a.time) return -1;
        if (b.time) return 1;
        return 0;
      });
      for (var m=0;m<groupItems.length;m++) {
        var r = groupItems[m];
        var riskBorder = r.riskLevel==='high'?'high':r.riskLevel==='mid'?'mid':'';
        html += '<div class="timeline-item '+riskBorder+'" onclick="openDrawer(\''+r.id+'\')">';
        html += '<div class="timeline-time">'+(r.time?esc(r.time):'全天')+'</div>';
        html += '<div class="timeline-content"><div class="timeline-title">'+esc(r.title)+'</div>';
        html += '<div class="timeline-meta">';
        if (r.location) html += esc(r.location)+' · ';
        html += esc(r.category);
        html += '</div></div>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ========== List View ==========
function renderList() {
  var active = appState.activeView==='list'?' active':'';
  var all = appState.reminders;
  var filtered = all.slice();

  if (activeListFilter==='active') filtered = filtered.filter(function(r){return !appState.completedIds.includes(r.id);});
  else if (activeListFilter==='completed') filtered = filtered.filter(function(r){return appState.completedIds.includes(r.id);});
  else if (activeListFilter==='high') filtered = filtered.filter(function(r){return r.riskLevel==='high' && !appState.completedIds.includes(r.id);});

  if (listSearchQuery) {
    var q = listSearchQuery.toLowerCase();
    filtered = filtered.filter(function(r){
      return r.title.toLowerCase().indexOf(q)!==-1 || (r.category&&r.category.toLowerCase().indexOf(q)!==-1);
    });
  }
  filtered.sort(function(a,b){
    var ac = appState.completedIds.includes(a.id), bc = appState.completedIds.includes(b.id);
    if (ac !== bc) return ac ? 1 : -1;
    return daysUntil(a.date) - daysUntil(b.date);
  });

  var html = '<div class="view'+active+'" id="view-list">';
  html += '<div class="filter-bar">';
  var filters = [{id:'all',l:'全部'},{id:'active',l:'未完成'},{id:'completed',l:'已完成'},{id:'high',l:'高优先级'}];
  for (var i=0;i<filters.length;i++) {
    html += '<button class="filter-chip'+(activeListFilter===filters[i].id?' active':'')+'" onclick="activeListFilter=\''+filters[i].id+'\';renderApp()">'+filters[i].l+'</button>';
  }
  html += '<div class="search-box"><span class="search-icon">⌕</span><input type="text" placeholder="搜索提醒..." value="'+esc(listSearchQuery)+'" oninput="listSearchQuery=this.value;renderApp()"></div>';
  html += '</div>';

  if (filtered.length===0) {
    html += '<div class="empty-state"><div class="empty-icon">☰</div><div class="empty-text">没有匹配的提醒</div></div>';
  } else {
    html += '<div class="reminder-list">';
    for (var j=0;j<filtered.length;j++) {
      html += renderTaskItem(filtered[j]);
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function changeScenario(id) {
  appState.scenario = id;
  var sc = SCENARIOS.find(function(x){return x.id===id;});
  if (sc) appState.identity = sc.name;
  saveState();
  renderApp();
}
function changeInboxScenario(id) {
  changeScenario(id);
}

function exportData() {
  var data = JSON.stringify(appState, null, 2);
  var blob = new Blob([data], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'memorial-day-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓','已导出 JSON 文件');
}
function importData(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data && data.reminders) {
        if (!confirm('导入将覆盖当前数据，确定继续？')) return;
        appState = Object.assign(defaultState(), data);
        saveState();
        showToast('✓','数据已导入');
        renderApp();
      } else {
        showToast('✗','无效的备份文件');
      }
    } catch(err) {
      showToast('✗','文件解析失败');
    }
  };
  reader.readAsText(file, 'UTF-8');
  ev.target.value = '';
}

// ========== Toggle Complete ==========
function toggleComplete(id) {
  var idx = appState.completedIds.indexOf(id);
  if (idx >= 0) appState.completedIds.splice(idx, 1);
  else appState.completedIds.push(id);
  renderApp();
}

// ========== Drawer ==========

  var riskLabel = r.riskLevel==='high'?'高优先级':r.riskLevel==='mid'?'中优先级':'普通';

  html += '<div class="drawer-section"><h4>倒计时</h4><div><span class="drawer-countdown">'+(d<0?0:Math.max(0,d))+'</span><span class="drawer-countdown-unit">'+(d<0?'天前':d===0?'就是今天':'天后')+'</span></div></div>';

  html += '<div class="drawer-field"><span class="drawer-field-key">来源</span><span class="drawer-field-val">'+esc(r.source||'手动创建')+'</span></div>';
  html += '</div>';
  html += '<div class="drawer-section"><h4>Agent 建议</h4><div class="drawer-agent-msg">'+esc(r.reminderSuggestion||'')+'<br>'+esc(r.preparation||'')+'</div></div>';

  html += '<button class="btn btn-sm btn-success" onclick="toggleComplete(\''+r.id+'\');closeDrawer();">'+(completed?'↩ 撤销完成':'✓ 标记完成')+'</button>';
  html += '<button class="btn btn-sm btn-danger" onclick="deleteReminder(\''+r.id+'\')">🗑 删除</button>';

}
function closeDrawer() {
  var overlay = document.getElementById('drawerOverlay');
  if (overlay) overlay.classList.remove('open');
}
function deleteReminder(id) {
  if (!confirm('确定删除这条提醒？')) return;
  appState.reminders = appState.reminders.filter(function(r){return r.id!==id;});
  appState.completedIds = appState.completedIds.filter(function(x){return x!==id;});
  closeDrawer();
  showToast('🗑','提醒已删除');
  renderApp();
}

// ========== Toast ==========
function showToast(icon, text) {
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span class="toast-icon">'+icon+'</span><span style="flex:1;">'+esc(text)+'</span><span class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(function(){if(this.parentElement)this.parentElement.remove();}.bind(this),300)">✕</span>';
  container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 4000);
}

// ========== Simulated Notification ==========
function simulateNotification() {
  var active = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id) && daysUntil(r.date)<=3;});
  if (active.length===0) {
    showToast('🔔','这是页面内模拟提醒。PWA 可支持系统通知。');
    return;
  }
  var r = active[Math.floor(Math.random()*active.length)];
  var el = document.createElement('div');
  el.className = 'toast';
  el.style.cursor = 'pointer';
  el.innerHTML = '<span class="toast-icon">🔔</span><span style="flex:1;"><b>提醒</b><br>'+esc(r.title)+'<br><span style="font-size:11px;opacity:0.8;">'+esc(r.reminderSuggestion||'')+'</span></span><span class="toast-close" onclick="event.stopPropagation();this.parentElement.classList.add(\'removing\');setTimeout(function(){if(this.parentElement)this.parentElement.remove();}.bind(this),300)">✕</span>';
  el.onclick = function(e){ if(e.target.closest('.toast-close')) return; openDrawer(r.id); };
  var container = document.getElementById('toastContainer');
  container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 6000);
}

// ========== Welcome / Onboarding ==========
function showWelcome() {
  var el = document.getElementById('welcomeOverlay');
  if (el) el.style.display = 'flex';
}
function hideWelcome() {
  var el = document.getElementById('welcomeOverlay');
  if (el) el.style.display = 'none';
}
function selectScenario(id) {
  selectedScenario = id;
  var chips = document.querySelectorAll('.scenario-chip');
  for (var i=0;i<chips.length;i++) {
    if (chips[i].getAttribute('data-scenario')===id) chips[i].classList.add('active');
    else chips[i].classList.remove('active');
  }
}
function finishOnboarding() {
  var sc = SCENARIOS.find(function(x){return x.id===selectedScenario;});
  appState.identity = sc ? sc.name : '学生';
  var extra = document.getElementById('welcomeExtraInput');
  if (extra && extra.value.trim()) appState.identity += ' · ' + extra.value.trim();
  appState.scenario = selectedScenario;
  appState.onboarded = true;
  seedDemoDataIfNeeded();
  hideWelcome();
  appState.activeView = 'today';
  saveState();
  renderApp();
  showToast('✓','开始使用，身份：'+appState.identity);
}

// ========== Sample Pack & Reset ==========
function loadSamplePack() {
  appState.inbox = SAMPLE_NOTICES.map(function(n){return {...n,status:'unread'};});
  var sampleReminders = extractReminders(SAMPLE_NOTICES.map(function(n){return n.body;}).join('\n'), appState.identity||'学生', '示例数据');
  sampleReminders.push({
    id:uid(), title:'妈妈生日',
    date:(function(){var d=new Date();d.setDate(d.getDate()+20);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());})(),
    time:'', targetGroup:'家人', category:'生日', riskLevel:'low',
    reminderSuggestion:'提前准备礼物',
    preparation:'建议提前一周准备礼物和祝福。',
    source:'个人', sourceText:'妈妈生日还有20天', confidence:0.9
  });
  var existing = appState.reminders.map(function(r){return r.title;});
  for (var i=0;i<sampleReminders.length;i++) {
    if (existing.indexOf(sampleReminders[i].title)===-1 && sampleReminders[i].relevant!==false) {
      var r = Object.assign({}, sampleReminders[i]);
      delete r.relevant; delete r.selected;
      appState.reminders.push(r);
    }
  }
  inboxDrafts = [];
  quickDraft = null;
  showToast('✓','已加载示例数据');
  renderApp();
}
function resetDemo() {
  if (!confirm('确定重置 Demo？这会清空所有数据。')) return;
  localStorage.removeItem(STORAGE_KEY);
  appState = defaultState();
  inboxDrafts = [];
  quickDraft = null;
  activeCalTab = 'today';
  activeListFilter = 'all';
  listSearchQuery = '';
  selectedScenario = 'student';
  hideWelcome();
  showWelcome();
  showToast('🔄','Demo 已重置');
  appState.activeView = 'today';
  renderApp();
}

// ========== Helpers ==========
function esc(s) {
  if (s==null||s==undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toggleSidebar(open) {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebarOverlay');
  if (!sb || !ov) return;
  if (open) { sb.classList.add('open'); ov.classList.add('open'); }
  else { sb.classList.remove('open'); ov.classList.remove('open'); }
}

// ========== Init ==========
function init() {
  if (!appState.onboarded) showWelcome();
  else hideWelcome();
  selectedScenario = appState.scenario || 'student';
  renderApp();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
