/* ========== Reminders View ========== */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-chip {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-chip.active { background: var(--accent-terracotta); color: #fff; border-color: var(--accent-terracotta); }
.search-box {
  flex: 1;
  min-width: 180px;
  position: relative;
}
.search-box input { padding-left: 34px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
.reminder-list { display: flex; flex-direction: column; gap: 10px; }
.reminder-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.15s;
}
.reminder-item:hover { box-shadow: var(--shadow-md); border-color: var(--accent-terracotta); transform: translateX(2px); }
.reminder-item.completed { opacity: 0.55; }
.reminder-item.completed .reminder-title { text-decoration: line-through; }
.reminder-date-col {
  text-align: center;
  min-width: 56px;
  padding: 8px 6px;
  background: var(--bg-cream);
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
.reminder-date-day { font-size: 22px; font-weight: 700; color: var(--accent-terracotta-deep); line-height: 1; }
.reminder-date-month { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
.reminder-body { flex: 1; min-width: 0; }
.reminder-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.reminder-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.reminder-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* ========== Schedule View ========== */
.schedule-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-paper); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-subtle); width: fit-content; }
.schedule-tab { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.schedule-tab.active { background: var(--accent-terracotta); color: #fff; font-weight: 600; }
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content:''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--border-subtle); }
.timeline-group { margin-bottom: 20px; }
.timeline-date {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-terracotta-deep);
  margin-bottom: 10px;
  position: relative;
}
.timeline-date::before {
  content: '';
  position: absolute;
  left: -22px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent-terracotta);
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent-terracotta);
}
.timeline-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 8px;
  margin-left: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.15s;
}
.timeline-item:hover { box-shadow: var(--shadow-sm); border-color: var(--accent-terracotta); }
.timeline-time {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-terracotta);
  min-width: 52px;
  flex-shrink: 0;
}
.timeline-content { flex: 1; }
.timeline-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.timeline-meta { font-size: 11px; color: var(--text-muted); }

/* ========== Risk Center View ========== */
.risk-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.risk-group { margin-bottom: 20px; }
.risk-group h3 { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.risk-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.risk-item.high { border-left: 3px solid var(--accent-red); }
.risk-item.mid { border-left: 3px solid var(--accent-amber); }
.risk-item.low { border-left: 3px solid var(--accent-blue); }
.risk-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.risk-body { flex: 1; }
.risk-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
.risk-reason { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 6px; }
.risk-advice { font-size: 11px; color: var(--accent-moss-deep); background: rgba(125,143,117,0.08); padding: 6px 10px; border-radius: var(--radius-sm); }
.risk-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* ========== TimeCard Workshop ========== */
.card-workshop { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
.card-preview-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.timecard-preview {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3/4;
  border-radius: var(--radius-xl);
  padding: 24px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.timecard-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(155deg, rgba(255,255,255,0.15), transparent 60%);
  pointer-events: none;
}
.tc-theme-exam { background: linear-gradient(160deg, #3B5998, #1E3A8A); color: #fff; }
.tc-theme-birthday { background: linear-gradient(160deg, #F9A8D4, #EC4899); color: #fff; }
.tc-theme-finance { background: linear-gradient(160deg, #A78BFA, #7C3AED); color: #fff; }
.tc-theme-health { background: linear-gradient(160deg, #6EE7B7, #059669); color: #fff; }
.tc-theme-code { background: linear-gradient(160deg, #334155, #0F172A); color: #F1F5F9; }
.tc-theme-travel { background: linear-gradient(160deg, #67E8F9, #0891B2); color: #fff; }
.tc-top { display: flex; justify-content: space-between; align-items: flex-start; }
.tc-cat {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  background: rgba(255,255,255,0.2);
  border-radius: var(--radius-pill);
  backdrop-filter: blur(8px);
}
.tc-date { font-size: 11px; opacity: 0.8; }
.tc-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
.tc-days { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.tc-unit { font-size: 18px; font-weight: 600; opacity: 0.9; }
.tc-title { font-size: 22px; font-weight: 700; margin-top: 8px; }
.tc-bottom {
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.15);
  font-size: 11px;
  opacity: 0.85;
  line-height: 1.6;
}
.theme-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.theme-dot {
  padding: 8px;
  border-radius: var(--radius-md);
  border: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  background: var(--bg-paper);
}
.theme-dot:hover { transform: scale(1.05); }
.theme-dot.active { border-color: var(--accent-terracotta); }
.theme-dot-swatch { width: 28px; height: 28px; border-radius: 50%; margin: 0 auto 4px; box-shadow: var(--shadow-sm); }
.theme-dot-name { font-size: 10px; color: var(--text-secondary); font-weight: 500; }
.workshop-controls { display: flex; flex-direction: column; gap: 14px; }
.reminder-picker { width: 100%; padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: var(--bg-paper); font-size: 13px; }

/* ========== Platform View ========== */
.platform-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.platform-card {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.platform-card h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.platform-card ul { font-size: 12px; color: var(--text-secondary); line-height: 2; }
.platform-card li { padding-left: 14px; position: relative; }
.platform-card li::before { content: '·'; position: absolute; left: 0; color: var(--accent-terracotta); font-weight: 700; }
.platform-badge { font-size: 10px; padding: 2px 8px; border-radius: var(--radius-pill); font-weight: 700; margin-left: 6px; }
.badge-native { background: rgba(125,143,117,0.12); color: var(--accent-moss-deep); }
.badge-pwa { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.badge-mock { background: rgba(217,119,6,0.1); color: var(--accent-amber); }
.badge-limit { background: rgba(220,38,38,0.08); color: var(--accent-red); }

/* ========== TRAE View ========== */
.trae-session-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.trae-session-item {
  padding: 12px 16px;
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--text-secondary);
  font-family: 'SF Mono', Menlo, Consolas, monospace;
}

/* ========== Detail Drawer ========== */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,36,30,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  animation: fadeIn 0.2s;
}
.drawer-overlay.open { display: flex; justify-content: flex-end; }
.drawer {
  width: 420px;
  max-width: 92vw;
  height: 100%;
  background: var(--bg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  animation: slideInRight 0.28s ease;
  overflow-y: auto;
}
@keyframes slideInRight { from{transform:translateX(100%);}to{transform:translateX(0);} }
.drawer-head {
  padding: 20px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
}
.drawer-title { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.3; margin-bottom: 6px; }
.drawer-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
.drawer-close { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-muted); flex-shrink: 0; }
.drawer-close:hover { background: var(--bg-cream); color: var(--text-primary); }
.drawer-section { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
.drawer-section h4 { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.drawer-countdown { font-size: 36px; font-weight: 800; color: var(--accent-terracotta); line-height: 1; }
.drawer-countdown-unit { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-left: 4px; }
.drawer-field { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.drawer-field-key { color: var(--text-muted); }
.drawer-field-val { color: var(--text-primary); font-weight: 600; text-align: right; max-width: 60%; }
.drawer-agent-msg {
  background: rgba(125,143,117,0.08);
  border-left: 3px solid var(--accent-moss);
  padding: 12px 14px;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.8;
  font-style: italic;
}
.drawer-prep-list { font-size: 13px; color: var(--text-secondary); line-height: 2; }
.drawer-source { font-size: 12px; color: var(--text-muted); background: var(--bg-cream); padding: 10px 12px; border-radius: var(--radius-md); line-height: 1.7; max-height: 100px; overflow-y: auto; }
.drawer-actions {
  padding: 16px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: auto;
  background: var(--bg);
  position: sticky;
  bottom: 0;
  border-top: 1px solid var(--border-subtle);
}

/* ========== Toast ========== */
.toast-container { position: fixed; top: 60px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast {
  background: var(--text-primary);
  color: #fff;
  padding: 12px 18px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  max-width: 320px;
  pointer-events: auto;
  cursor: pointer;
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.6;
}
@keyframes toastIn { from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);} }
.toast.removing { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut { to{opacity:0;transform:translateX(30px);} }
.toast-icon { font-size: 18px; flex-shrink: 0; }
.toast-close { margin-left: auto; font-size: 16px; opacity: 0.6; flex-shrink: 0; }
.toast-close:hover { opacity: 1; }

/* ========== Welcome / Onboarding ========== */
.welcome-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.welcome-card {
  position: relative;
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 32px 28px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
  animation: welcomeIn 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes welcomeIn { from{opacity:0;transform:translateY(16px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);} }
.welcome-logo {
  width: 56px; height: 56px;
  background: var(--accent-primary);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; font-weight: 800;
  margin: 0 auto 16px;
  box-shadow: 0 4px 12px rgba(79,70,229,0.2);
}
.welcome-title { font-size: 24px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; text-align: center; letter-spacing: -0.5px; }
.welcome-subtitle { font-size: 14px; font-weight: 600; color: var(--accent-primary); margin-bottom: 12px; text-align: center; }
.welcome-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; text-align: center; }
.welcome-scenarios { margin-bottom: 16px; text-align: left; }
.welcome-scenarios-label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 8px; }
.scenario-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.scenario-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px; background: var(--bg-cream);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
  font-size: 12px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s; text-align: left;
}
.scenario-chip:hover { border-color: var(--accent-primary); }
.scenario-chip.active {
  background: var(--accent-primary-soft); border-color: var(--accent-primary);
  color: var(--accent-primary-deep); font-weight: 600;
}
.scenario-chip .s-icon { font-size: 16px; flex-shrink: 0; }
.scenario-chip .s-text { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.scenario-chip .s-title { font-size: 12px; font-weight: inherit; line-height: 1.2; }
.scenario-chip .s-desc { font-size: 10px; color: var(--text-muted); margin-top: 1px; font-weight: 400; line-height: 1.2; }
.welcome-identity-extra { margin-bottom: 16px; text-align: left; }
.welcome-identity-extra label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 6px; }
.welcome-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.welcome-buttons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.welcome-hint { font-size: 11px; color: var(--text-muted); padding-top: 12px; border-top: 1px solid var(--border-subtle); line-height: 1.6; text-align: center; opacity: 0.8; }
.welcome-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border-subtle); padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.sidebar-version-badge { font-size: 10px; color: var(--text-muted); text-align: center; padding: 6px 8px; border-top: 1px solid var(--border-subtle); margin-top: 4px; opacity: 0.7; }

/* ========== Bottom Tab (mobile) ========== */
.bottom-tab { display: none; }

/* ========== Mobile menu button (hidden on desktop) ========== */
.menu-btn { display: none; }

/* deprecated - guided tour removed in v3.0 */
.tour-highlight { position: relative; z-index: 150; }
.tour-pulse { animation: none; }
.tour-tooltip { display: none; }
.tour-next { display: none; }
.tour-skip { display: none; }


/* Dashboard three-card layout */
.dash-greeting { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; font-weight: 500; }
.dash-three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.dash-card {
  background: var(--bg-paper); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm);
}
.dash-card-title {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.dash-card-list { display: flex; flex-direction: column; gap: 8px; }
.dash-card-item {
  font-size: 13px; color: var(--text-primary); padding: 8px 10px;
  background: var(--bg-cream); border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s;
}
.dash-card-item:hover { background: var(--accent-primary-soft); }
.dash-card-empty { font-size: 12px; color: var(--text-muted); padding: 12px; text-align: center; font-style: italic; }
.dash-quick-actions { display: flex; flex-direction: column; gap: 8px; }
.dash-quick-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--bg-cream);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500; color: var(--text-primary);
  cursor: pointer; transition: all 0.15s; text-align: left;
}
.dash-quick-btn:hover { border-color: var(--accent-primary); background: var(--accent-primary-soft); color: var(--accent-primary-deep); }
.dash-quick-btn .q-icon { font-size: 18px; width: 24px; text-align: center; }
.first-hint {
  background: var(--bg-cream); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 20px; text-align: center; margin-bottom: 20px;
}
.first-hint-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.first-hint-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.6; }
.first-hint-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.chat-intro {
  font-size: 12px; color: var(--text-secondary); background: var(--bg-cream);
  padding: 10px 14px; border-radius: var(--radius-md); margin-bottom: 12px; line-height: 1.6;
}
/* Upload card compact */
.upload-card {
  background: var(--bg-paper); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px;
}
.upload-card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
.upload-row { display: flex; gap: 10px; align-items: stretch; }
.upload-row .upload-zone { margin-bottom: 0; padding: 14px 10px; border-radius: var(--radius-md); flex:1; min-width:160px; }
.upload-status { margin-top: 6px; }
.upload-status-ok { font-size: 12px; color: var(--accent-green-deep); background: rgba(16,185,129,0.06); padding: 6px 10px; border-radius: var(--radius-md); line-height: 1.5; }
.upload-status-warn { font-size: 12px; color: var(--accent-amber); background: rgba(245,158,11,0.06); padding: 6px 10px; border-radius: var(--radius-md); line-height: 1.5; }
.inbox-list-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px 4px; }
.file-input-hidden { display: none; }
.draft-actions { position: sticky; bottom: 0; background: var(--bg-paper); padding: 8px 0; z-index: 5; }
.about-honest { font-size: 11px; color: var(--text-muted); background: var(--bg-cream); padding: 12px 14px; border-radius: var(--radius-md); line-height: 1.7; margin-top: 14px; }

/* ========== Skeleton loading ========== */

/* ========== Premium Polish Overrides ========== */
/* Icon containers: reduce emoji rawness by adding subtle backdrop */
.quick-icon {
  width: 48px; height: 48px;
  margin: 0 auto 10px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;

  background: linear-gradient(135deg, rgba(79,70,229,0.08), rgba(16,185,129,0.08));
  transition: transform 0.25s;
}
.quick-action:hover .quick-icon { transform: scale(1.08) rotate(-3deg); }

/* Nav icons: subtle circle background on active */
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: background 0.15s;
}
.nav-item.active .nav-icon {
  background: rgba(79,70,229,0.12);
}

/* Tab icons: rounded bg when active */
.tab-icon {
  width: 32px; height: 24px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.tab-item.active .tab-icon {
  background: var(--accent-primary-soft);
}
.tab-item { padding: 4px 0 6px; }
.tab-item.active { font-weight: 600; }

/* Toast: glass style, warmer, not pure black */
.toast {
  background: rgba(44,36,30,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
}
.toast-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(79,70,229,0.20);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

/* Empty state: icon container */
.empty-icon {
  width: 72px; height: 72px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(79,70,229,0.06), rgba(125,143,117,0.08));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  opacity: 1;
}

/* Risk item icon container */
.risk-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  margin-top: 0;
  flex-shrink: 0;
}
.risk-item.high .risk-icon { background: rgba(220,38,38,0.1); }
.risk-item.mid .risk-icon { background: rgba(217,119,6,0.1); }
.risk-item.low .risk-icon { background: rgba(37,99,235,0.1); }
.risk-item { transition: all 0.15s; }
.risk-item:hover { box-shadow: var(--shadow-sm); transform: translateX(2px); }

/* Stat cards: richer gradient top border */
.stat-card {
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-terracotta), var(--accent-moss));
  opacity: 0;
  transition: opacity 0.2s;
}
.stat-card.warning::before { background: var(--accent-amber); opacity: 1; }
.stat-card.danger::before { background: var(--accent-red); opacity: 1; }
.stat-card.primary::before { background: var(--accent-terracotta); opacity: 1; }
.stat-card.success::before { background: var(--accent-moss); opacity: 1; }
.stat-card.warning, .stat-card.danger, .stat-card.primary, .stat-card.success {
  border-left: none;
}
.stat-num { letter-spacing: -0.5px; }

/* Reminder date column: richer */
.reminder-date-col {
  background: linear-gradient(135deg, var(--bg-cream), rgba(79,70,229,0.06));

/* Welcome logo: more premium */

  box-shadow: 0 8px 24px rgba(79,70,229,0.20);

  display: inline-block;

/* Upload zone */

.upload-status-warn {

.inbox-list-title {

  m = text.match(/(?:到|去)\s*([\u4e00-\u9fa5]{2,8}(?:实验室|馆|操场|教室|楼|办公室|礼堂))/);
  if (m) return m[1];
  return '';
}
function buildTitle(clean, action, date, time, loc) {
  var s = stripListMarker(clean);
  // Prefer short, natural title: if we have action keyword, build around it
  var kw = action && action.kw ? action.kw : '';
  if (kw) {
    var kwIdx = s.indexOf(kw);
    if (kwIdx >= 0) {
      var before = s.substring(0, kwIdx);
      var after = s.substring(kwIdx + kw.length);
      // Strip trailing instruction clauses from after
      var cleanedAfter = after
        .replace(/^(?:至|到|了|在|的|于|给|把|开|举行|举办|召开|参加|参与|去)/, '')
        .replace(/(在|于)[A-Z0-9\u4e00-\u9fa5]{0,15}(室|厅|馆|楼|办|地点|地方|会议室|教室|实验室).*$/, '')
        .replace(/[\u4e00-\u9fa5]{0,8}办\d{3}室.*$/, '')  // strip office room like 学工办203室
        .replace(/[，,。；;！!？?].*$/, '')
        .replace(/请.*$/, '')
        .replace(/务必.*$/, '')
        .replace(/准时.*$/, '')
        .replace(/不得.*$/, '')
        .replace(/参加.*$/, '')
        .trim();

      // Strip date/time/location/address prefixes from "before" to keep title short
      var cleanedBefore = before
        .replace(/[（(][^）)]{0,8}[）)]/g, '') // remove parenthesized notes like （周日）
        .replace(/\d{4}\s*年/g, '')  // remove "2026年"
        .replace(/\d{1,2}\s*月\s*\d{1,2}\s*[日号]?/g, '')  // remove "7月8日"
        .replace(/(今天|明天|后天|下周[一二三四五六日天]?|本周[一二三四五六日天]?|周[一二三四五六日天]|下个?月底|\d+天后)/g, '')
        .replace(/(上午|早上|凌晨|中午|下午|晚上|深夜)?\s*\d{1,2}\s*[点时](?:\d{1,2}\s*分?)?(?:前)?/g, '')  // remove "下午3点"
        .replace(/\d{1,2}:\d{2}/g, '')  // remove "15:00"
        .replace(/(在|于)\s*[A-Za-z0-9\u4e00-\u9fa5]{0,15}(室|厅|馆|楼|办|地点|地方|会议室|教室|实验室)/g, '')  // remove "在B205教室"
        .replace(/(在|于)\s*[A-Za-z]?\d{2,4}(室|厅|馆|楼|会议室|教室|实验室|办)?(?=$|[，,。；;！!？?\s在到于了开举参加至])/g, '')  // remove "在B205" room codes
        .replace(/(到|去)\s*[\u4e00-\u9fa5]{2,8}(?:实验室|馆|操场|教室|楼|办公室|礼堂)/g, '') // remove "到实验室"
        .replace(/(线上|线下)/g, '')
        .replace(/(开|举?行|举办|召开|参加)/g, '') // remove trailing verbs before kw
        .replace(/^[，,。；;\s]+/, '')
        .replace(/[，,。；;\s]+$/, '')
        .trim();

      // Decision logic: prefer natural short titles
      // 1) If there's a short cleanedAfter (<=6 chars), use kw + cleanedAfter (e.g. "提交项目材料", "参加班会" but strip "参加")
      // 2) If cleanedBefore is short (<=6 chars), use cleanedBefore + kw (e.g. "项目提交")
      // 3) If loc is short (<=6 chars) and action is a meeting/activity, try "loc + kw" (e.g. "B205 班会")
      // 4) If we have date, try "M月D日 kw" (e.g. "7月8日 班会")
      // 5) Otherwise just use kw itself as the short title

      var candidate = null;

      if (cleanedAfter && cleanedAfter.length > 0 && cleanedAfter.length <= 8) {
        // e.g. "提交项目材料" — kw=提交, cleanedAfter=项目材料
        candidate = kw + cleanedAfter;
      }
      if (!candidate && cleanedBefore && cleanedBefore.length > 0 && cleanedBefore.length <= 8) {
        // Add a space if cleanedBefore ends with ASCII/digit (e.g. "B205") or looks like a place/meeting name
        var needsSpace = /[A-Za-z0-9]$/.test(cleanedBefore) || cleanedBefore.length <= 4;
        candidate = cleanedBefore + (needsSpace ? ' ' : '') + kw;
      }
      // Location-based short title for meetings/classes
      if (!candidate && loc && loc.length <= 8 && /会议|班会|讲座|培训|答辩|体检|考试|测验/.test(kw + (cleanedAfter||''))) {
        candidate = loc + ' ' + kw;
      }
      // Date-based short title when kw alone is meaningful
      if (!candidate && date) {
        var dm = date.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (dm) {
          var m = parseInt(dm[2],10), d = parseInt(dm[3],10);
          var today = new Date(); today.setHours(0,0,0,0);
          var target = new Date(parseInt(dm[1],10), m-1, d);
          var diff = Math.round((target - today)/86400000);
          var dateLabel;
          if (diff === 0) dateLabel = '今天';
          else if (diff === 1) dateLabel = '明天';
          else if (diff === 2) dateLabel = '后天';
          else dateLabel = m+'月'+d+'日';
          candidate = dateLabel + ' ' + kw;
        }
      }
      // Last fallback: just the action keyword itself
      if (!candidate) candidate = kw;
      return candidate;
    }
  }
  // Fallback: strip list markers, date/time/location from start, punctuation from end, take short head
  var title = s
    .replace(/^\s*(?:\d{1,3}\s*[.、．\)）]\s*|[\-\*·•]\s*|[①-⑳]\s*|[一二三四五六七八九十]+[、．.]\s*)/, '')
    .replace(/\d{1,2}\s*月\s*\d{1,2}\s*[日号]?\s*/, '')
    .replace(/(今天|明天|后天|下周[一二三四五六日天]?|本周[一二三四五六日天]?|周[一二三四五六日天]|下个?月底|\d+天后)/g, '')
    .replace(/(上午|早上|凌晨|中午|下午|晚上|深夜)?\s*\d{1,2}\s*[点时](?:\d{1,2}\s*分?)?(?:前)?\s*/g, '')
    .replace(/(在|于)[A-Z0-9\u4e00-\u9fa5]{0,12}(室|厅|馆|楼|办|地点|地方|会议室|教室|实验室)\s*/, '')
    .replace(/(在|于)\s*[A-Za-z]?\d{2,4}(室|厅|馆|楼|会议室|教室|实验室|办)?(?=$|[，,。；;！!？?\s在到于了开举参加至])\s*/, '')
    .replace(/[，,。；;！!？?].*$/, '')
    .replace(/请.*$/, '')
    .trim();
  if (title.length > 14) title = title.substring(0, 14);
  return title || (kw || '事项');
}
function daysUntil(dateStr) {
  if (!dateStr || dateStr==='待确认') return 999;
  var parts = dateStr.split('-'); if (parts.length<3) return 999;
  var d = new Date(+parts[0],+parts[1]-1,+parts[2]);
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function daysUntilLabel(dateStr) {
  var d = daysUntil(dateStr);
  if (d<0) return '已逾期';
  if (d===0) return '今天';
  if (d===1) return '明天';
  if (d<=7) return d+'天后';
  return d+'天后';
}

// ========== Chat Agent Response Logic ==========
function agentReply(userText) {
  var date = parseDate(userText), time = parseTime(userText), action = parseAction(userText), groups = parseGroups(userText), loc = parseLocation(userText);
  var title = buildTitle(userText, action, date, time, loc);
  var reply = { text: '', parsed: null, canSave: false };
  if (date || action.kw) {
    reply.canSave = true;
    var catName = action.cat;
    var riskLabel = action.risk==='high'?'高风险':action.risk==='mid'?'中风险':'低风险';
    reply.parsed = {
      title: title, date: date||'待确认', time: time||'待确认', category: catName,
      targetGroup: groups.length?groups.join('、'):(appState.identity||'个人'), riskLevel: action.risk,
      reminderSuggestion: date?('提前 '+(action.risk==='high'?'3天':action.risk==='mid'?'1天':'当天')+'提醒'):'建议手动确认日期',
      preparation: PREP_MAP[action.risk]||PREP_MAP.mid, source: 'Agent 对话', sourceText: userText
    };
    var dateStr = date ? ('📅 ' + date + (time?' '+time:'')) : '⚠️ 未识别到具体日期，请补充';
    reply.text = '我识别到一个' + catName + '事项：\n\n' +
      '• 事项：' + title + '\n' +
      '• ' + dateStr + '\n' +
      '• 场景：' + catName + '\n' +
      '• 风险：' + riskLabel + '\n' +
      '• 建议：' + reply.parsed.reminderSuggestion + '\n' +
      '• 准备：' + reply.parsed.preparation + '\n\n' +
      '是否保存为提醒草稿？';
  } else {
    // General conversation
    var greetings = /你好|您好|hi|hello|在吗/i;
    if (greetings.test(userText)) {
      reply.text = '你好！我是你的任务处理助手。\n\n你可以：\n• 直接告诉我事项，如"明天下午3点开班会"\n• 粘贴通知文本让我提取提醒\n• 上传TXT文件解析\n\n当前身份：' + (appState.identity||'未设置');
    } else if (/重置|清空|清除/.test(userText)) {
      reply.text = '如果要重置所有数据，请在左侧导航底部找到"重置 Demo"按钮。这会清空所有提醒和对话记录。';
    } else if (/你是谁|你能做什么|功能/.test(userText)) {
      reply.text = '我是任务处理助手，可以帮你：\n1. 语音/文字输入快速创建提醒\n2. 解析通知文本，筛选与你有关的事项\n3. 管理日程和待处理优先级\n\n当前为 Web/PWA 版本，使用本地规则解析。';
    } else {
      reply.text = '我暂时没能识别出明确的时间事项。你可以试试说：\n• "明天下午三点开班会"\n• "下周三交创新创业材料"\n• "7月5日考试"\n• "妈妈生日还有20天"\n\n也可以去"通知收件箱"加载示例通知包体验批量解析。';
    }
  }
  return reply;
}

// ---------- Dashboard ----------
function getGreeting() {
  var now = new Date();
  var hour = now.getHours();
  var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  var wd = weekdays[now.getDay()];
  var period;
  if (hour < 6) period = '凌晨好';
  else if (hour < 9) period = '早上好';
  else if (hour < 12) period = '上午好';
  else if (hour < 14) period = '中午好';
  else if (hour < 18) period = '下午好';
  else period = '晚上好';
  return wd + period;
}
function renderDashboard() {

function setupMicButton() {

    btn.classList.remove('disabled');

}
function resetVoiceState() {
  voiceListening = false;
  var btn = document.getElementById('chatMicBtn');
  if (btn) {
    btn.classList.remove('listening');
    btn.disabled = !voiceSupported;
    if (!voiceSupported) btn.classList.add('disabled');
    else btn.classList.remove('disabled');
    btn.setAttribute('aria-label', '语音输入');
    var existing = btn.querySelector('.voice-interim');
    if (existing) existing.remove();
  }
  var inp = document.getElementById('chatInput');
  if (inp) inp.placeholder = '输入事项...';
}
function toggleChatVoice(e) {
  if (e) e.preventDefault();
  if (!voiceSupported) {
    showToast('⚠️','当前浏览器暂不支持语音识别，请使用文字输入。推荐使用 Chrome/Edge 并通过 HTTPS 访问（公网链接已支持 HTTPS）。');
    return;
  }
  var btn = document.getElementById('chatMicBtn');
  if (!btn) return;
  if (voiceListening) {
    try { voiceRecognition.stop(); } catch(err) {}
    resetVoiceState();
    return;
  }
  if (!voiceRecognition) {
    try {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SR();
      voiceRecognition.lang = 'zh-CN';
      voiceRecognition.continuous = false;
      voiceRecognition.interimResults = true;
      voiceRecognition.onstart = function() {
        voiceListening = true;
        var b = document.getElementById('chatMicBtn');
        if (b) { b.classList.add('listening'); b.setAttribute('aria-label','正在聆听...'); }
        var inp = document.getElementById('chatInput');
        if (inp) inp.placeholder = '正在聆听，请说话...';
      };
      voiceRecognition.onresult = function(ev) {
        var finalTranscript = '';
        var interimTranscript = '';
        for (var i = ev.resultIndex; i < ev.results.length; i++) {
          if (ev.results[i].isFinal) {
            finalTranscript += ev.results[i][0].transcript;
          } else {
            interimTranscript += ev.results[i][0].transcript;
          }
        }
        var inp = document.getElementById('chatInput');
        if (inp && finalTranscript) {
          var cur = inp.value;
          inp.value = (cur ? cur + ' ' : '') + finalTranscript;
          inp.focus();
          autoResizeChat(inp);
        }
        var b = document.getElementById('chatMicBtn');
        if (b) {
          var oldInterim = b.querySelector('.voice-interim');
          if (oldInterim) oldInterim.remove();
          if (interimTranscript) {
            var inter = document.createElement('span');
            inter.className = 'voice-interim';
            inter.textContent = interimTranscript;
            b.appendChild(inter);
          }
        }
      };
      voiceRecognition.onend = function() { resetVoiceState(); };
      voiceRecognition.onerror = function(ev) {
        resetVoiceState();
        var errMsg = '语音识别出错';
        if (ev && ev.error) {
          if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') errMsg = '麦克风权限未开启，请允许浏览器访问麦克风，或改用文字输入。';
          else if (ev.error === 'no-speech') errMsg = '未检测到语音，请靠近麦克风再试。';
          else if (ev.error === 'network') errMsg = '语音识别需要网络连接，请检查网络。';
          else errMsg = '语音识别出错：' + ev.error;
        }
        showToast('⚠️', errMsg);
      };
    } catch(err) {
      resetVoiceState();
      showToast('⚠️','语音初始化失败，请使用文字输入');
      return;
    }
  }
  try {
    voiceRecognition.start();
    voiceListening = true;
    btn.classList.add('listening');
    btn.setAttribute('aria-label','正在聆听...');
    var inp = document.getElementById('chatInput');
    if (inp) inp.placeholder = '正在聆听，请说话...';
  } catch(err) {
    try { voiceRecognition.stop(); } catch(e) {}
    resetVoiceState();
    setTimeout(function(){
      try {
        voiceRecognition.start();
        voiceListening = true;
        var b2 = document.getElementById('chatMicBtn');
        if (b2) { b2.classList.add('listening'); b2.setAttribute('aria-label','正在聆听...'); }
      } catch(e2) { resetVoiceState(); }
    }, 200);
  }
}

function readFileNotice(file) {

    reader.onload = function(e) {

      };
      appState.inbox.unshift(newNotice);
      activeInboxId = newNotice.id;
      showToast('✅','TXT 文件已读取：'+file.name);
      renderApp();

    };

  } else {
    showToast('⚠️','当前初赛 Demo 建议复制文本或上传 TXT，PDF/DOCX 深度解析将在复赛完善。');

// ---------- Risk Center ----------
function computeRisks() {
  var active = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id);});
  var highCats = ['考试','缴费','材料提交','答辩','截止日期'];
  var risks = { overdue:[], today:[], nearFuture:[], conflict:[], noTime:[], highCat:[] };
  for (var i=0;i<active.length;i++) {
    var r = active[i];
    var d = daysUntil(r.date);
    if (d<0) risks.overdue.push(r);
    else if (d===0) risks.today.push(r);
    else if (d<=3) risks.nearFuture.push(r);
    if (!r.time || r.time==='待确认') risks.noTime.push(r);
    if (highCats.indexOf(r.category)!==-1) risks.highCat.push(r);
  }
  // Conflict detection
  var dateMap = {};
  for (var j=0;j<active.length;j++) {
    var r2 = active[j]; if(!r2.date||r2.date==='待确认') continue;
    if (!dateMap[r2.date]) dateMap[r2.date] = [];
    dateMap[r2.date].push(r2);
  }
  for (var k in dateMap) if (dateMap[k].length>1) risks.conflict.push({date:k,items:dateMap[k]});
  risks.high = [].concat(risks.overdue, risks.nearFuture.filter(function(r){return r.riskLevel==='high';}));
  return risks;
}
function renderRisk() {
  var active = appState.activeView==='risk'?' active':'';
  var risks = computeRisks();
  var html = '<div class="view'+active+'" id="view-risk">';
  html += '<div class="view-header"><div class="view-title">待处理优先级</div><div class="view-subtitle">按优先级排列待处理事项</div></div>';
  html += '<div class="risk-overview">';
  html += '<div class="stat-card danger"><div class="stat-num">'+risks.overdue.length+'</div><div class="stat-label">已逾期</div></div>';
  html += '<div class="stat-card warning"><div class="stat-num">'+risks.today.length+'</div><div class="stat-label">今天事项</div></div>';
  html += '<div class="stat-card primary"><div class="stat-num">'+risks.nearFuture.length+'</div><div class="stat-label">3天内事项</div></div>';
  html += '</div>';
  function riskBlock(level, icon, title, items, advice, renderFn) {
    if (!items || items.length===0) return '';
    var cls = level==='high'?'high':level==='mid'?'mid':'low';
    var h = '<div class="risk-group"><h3>'+icon+' '+title+' ('+items.length+')</h3>';
    for (var i=0;i<items.length;i++) h += renderFn(items[i], cls);
    h += '</div>';
    return h;
  }
  function renderRiskItem(r, cls) {
    return '<div class="risk-item '+cls+'"><div class="risk-icon">⚠️</div><div class="risk-body"><div class="risk-title">'+esc(r.title)+'</div><div class="risk-reason">'+esc(r.date)+(r.time?' '+esc(r.time):'')+' · '+esc(r.category)+' · 剩余 '+daysUntilLabel(r.date)+'</div><div class="risk-advice">💡 '+esc(PREP_MAP[r.riskLevel]||PREP_MAP.mid)+'</div></div><div class="risk-actions"><button class="btn-icon btn-ghost" onclick="openDrawer(\''+r.id+'\')">→</button></div></div>';
  }
  html += riskBlock('high','🚨','已逾期事项',risks.overdue,'尽快处理',renderRiskItem);
  html += riskBlock('mid','📅','今天事项',risks.today,'今日完成',renderRiskItem);
  html += riskBlock('mid','⏰','未来3天事项',risks.nearFuture,'提前准备',renderRiskItem);
  html += riskBlock('mid','📌','高风险类别',risks.highCat.filter(function(r){return risks.overdue.indexOf(r)===-1 && risks.nearFuture.indexOf(r)===-1;}),'重点关注',renderRiskItem);
  if (risks.noTime.length>0) {
    html += '<div class="risk-group"><h3>❓ 缺少具体时间的事项 ('+risks.noTime.length+')</h3>';
    for (var n=0;n<risks.noTime.length;n++) html += renderRiskItem(risks.noTime[n],'low');
    html += '</div>';
  }
  if (risks.conflict.length>0) {
    html += '<div class="risk-group"><h3>⚡ 同一天多个事项 ('+risks.conflict.length+'天)</h3>';
    for (var c=0;c<risks.conflict.length;c++) {
      var cf = risks.conflict[c];
      html += '<div class="risk-item mid"><div class="risk-icon">⚡</div><div class="risk-body"><div class="risk-title">'+esc(cf.date)+' 有 '+cf.items.length+' 个事项</div><div class="risk-reason">'+cf.items.map(function(i){return i.title;}).join('、')+'</div><div class="risk-advice">💡 注意时间冲突，建议提前规划顺序</div></div></div>';
    }
    html += '</div>';
  }
  var total = risks.overdue.length+risks.today.length+risks.nearFuture.length+risks.highCat.length+risks.noTime.length+risks.conflict.length;
  if (total===0) html += '<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">暂无风险事项，安排得井井有条！</div></div>';
  html += '</div>';
  return html;
}

// ========== Toast ==========
function showToast(icon, text) {
  var container = document.getElementById('toastContainer'); if (!container) return;
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span class="toast-icon">'+icon+'</span><span style="flex:1;">'+esc(text)+'</span><span class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(function(){this.parentElement.remove();}.bind(this),300)">✕</span>';
  el.onclick = function(e){ if(e.target.classList.contains('toast-close')) return; /* handle notification click */ };
  container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 4000);
}

// ========== Simulated Notification ==========
function simulateNotification() {
  var active = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id) && daysUntil(r.date)<=3;});
  if (active.length===0) {
    showToast('🔔','这是页面内模拟提醒，非系统通知。HarmonyOS 原生版可接入系统通知。');
    return;
  }
  var r = active[Math.floor(Math.random()*active.length)];
  var el = document.createElement('div');
  el.className = 'toast';
  el.style.cursor = 'pointer';
  el.innerHTML = '<span class="toast-icon">🔔</span><span style="flex:1;"><b>Memorial day 提醒</b><br>'+esc(r.title)+'<br><span style="font-size:11px;opacity:0.8;">'+esc(r.reminderSuggestion||'')+'</span></span><span class="toast-close" onclick="event.stopPropagation();this.parentElement.classList.add(\'removing\');setTimeout(function(){this.parentElement.remove();}.bind(this),300)">✕</span>';
  el.onclick = function(e){ if(e.target.closest('.toast-close')) return; openDrawer(r.id); };
  var container = document.getElementById('toastContainer'); container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 6000);
}

// ========== Welcome / Onboarding ==========
function showWelcome() { document.getElementById('welcomeOverlay').style.display='flex'; }
function hideWelcome() { document.getElementById('welcomeOverlay').style.display='none'; }
function getSelectedScenarioName() {
  var s = selectedScenario || 'student';
  var found = SCENARIOS.find(function(sc){return sc.id===s;});
  var extra = '';
  var inp = document.getElementById('welcomeIdentityInput');
  if (inp && inp.value.trim()) extra = ' · ' + inp.value.trim();
  return (found ? found.name : '学生') + extra;
}
function selectScenario(id) {
  selectedScenario = id;
  var chips = document.querySelectorAll('.scenario-chip');
  for (var i=0;i<chips.length;i++) {
    if (chips[i].getAttribute('data-scenario')===id) chips[i].classList.add('active');
    else chips[i].classList.remove('active');
  }
}
function enterWorkbench() {
  appState.identity = getSelectedScenarioName();
  appState.scenario = selectedScenario;
  appState.onboarded = true;
  seedDemoDataIfNeeded();
  hideWelcome();
  appState.activeView = 'dashboard';
  saveState();
  renderApp();
  showToast('👤','身份：'+appState.identity);
}
function importNotices() {
  appState.identity = getSelectedScenarioName();
  appState.scenario = selectedScenario;
  appState.onboarded = true;
  seedDemoDataIfNeeded();
  hideWelcome();
  appState.activeView = 'inbox';
  saveState();
  renderApp();
  setTimeout(function(){
    var ta = document.getElementById('inboxPasteText');
    if (ta) ta.focus();
  }, 200);
}
function finishWelcome() {
  enterWorkbench();
}
function loadSamplePackAndStart() {
  appState.identity = getSelectedScenarioName();
  appState.scenario = selectedScenario;
  appState.onboarded = true;
  loadSamplePack();
  hideWelcome();
  appState.activeView = 'dashboard';
  saveState();
  renderApp();
  showToast('📦','已加载示例数据');
}

// ========== Sample Pack & Reset ==========
function loadSamplePack() {
  appState.inbox = SAMPLE_NOTICES.map(function(n){return {...n,status:'unread',parsedDrafts:[]};});
  var sampleReminders = extractReminders(SAMPLE_NOTICES.map(n=>n.body).join('\n'), appState.identity||'学生', '示例通知包');
  // Add some sample personal reminders
  sampleReminders.push({
    id:uid(),title:'妈妈生日',date:(function(){var d=new Date();d.setDate(d.getDate()+20);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());})(),time:'',targetGroup:'家人',category:'生日',riskLevel:'low',reminderSuggestion:'提前准备礼物',preparation:'建议提前一周准备礼物和祝福。',source:'个人',sourceText:'妈妈生日还有20天',confidence:0.9
  });
  // Keep existing reminders too, but avoid duplicates by title
  var existing = appState.reminders.map(function(r){return r.title;});
  for (var i=0;i<sampleReminders.length;i++) if (existing.indexOf(sampleReminders[i].title)===-1 && sampleReminders[i].relevant!==false) appState.reminders.push(sampleReminders[i]);
  for (var j=0;j<appState.inbox.length;j++) appState.inbox[j].status='unread';
  activeInboxId = appState.inbox[0].id; inboxDrafts=[];
  setStatus('busy','正在加载示例...');
  setTimeout(function(){ setStatus('ready','已加载示例通知包'); showToast('📦','已加载示例数据'); renderApp(); },500);
}
function resetDemo() {
  if (!confirm('确定重置 Demo？这会清空所有提醒、对话和身份设置。')) return;
  localStorage.removeItem(STORAGE_KEY);
  appState = defaultState();
  activeInboxId=null; inboxDrafts=[]; activeScheduleTab='today'; activeReminderFilter='all'; reminderSearchQuery=''; activeCardTheme='exam'; selectedCardReminderId=null;
  hideWelcome();
  showToast('🔄','Demo 已重置');
  renderApp();
}

// deprecated - guided tour removed in v3.0
function startGuidedTour() {
  showToast('💡','可通过"导入通知"开始使用');
}
function applyTheme(theme) {
  if (!theme) theme = (appState && appState.cardTheme) || 'exam';
  appState.cardTheme = theme;
  saveState();
  renderApp();
}
function applyTimeCardTheme(theme) {
  applyTheme(theme);
}
function renderWelcome() {
  showWelcome();
  return '';
}

// ========== Helpers ==========
function esc(s) { if(s==null||s==undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){showToast('📋','已复制到剪贴板');},function(){prompt('复制以下内容：',text);});
  } else { prompt('复制以下内容：',text); }
}
function setStatus(mode, text) {
  var dot = document.getElementById('statusDot'); var txt = document.getElementById('statusText');
  if (dot) { dot.classList.remove('busy','error'); if(mode==='busy')dot.classList.add('busy'); if(mode==='error')dot.classList.add('error'); }
  if (txt) txt.textContent = text;
}
function toggleSidebar(open) {
  var sb = document.getElementById('sidebar'); var ov = document.getElementById('sidebarOverlay');
  if(!sb||!ov) return;
  if(open){sb.classList.add('open');ov.classList.add('open');} else {sb.classList.remove('open');ov.classList.remove('open');}
}

// ========== Init ==========
function init() {
  if (!appState.onboarded) showWelcome();
  else hideWelcome();
  activeInboxId = appState.inbox.length>0 ? appState.inbox[0].id : null;
  renderApp();
  // Register service worker if available
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
