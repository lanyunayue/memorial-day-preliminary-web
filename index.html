  });
}

/* ============================================================
   EXPORT CARD AS IMAGE
   ============================================================ */
function exportCardAsImage(id){
  const r=records.find(x=>x.id===id); if(!r) return;
  toast('正在生成图片...','');
  setTimeout(()=>{
    try{
      const W=720, H=480;
      const canvas=document.createElement('canvas');
      canvas.width=W; canvas.height=H;
      const ctx=canvas.getContext('2d');
      // Background
      const isDark=settings.theme==='night';
      if(r.coverImage && validateImageDataURL(r.coverImage)){
        const img=new Image();
        img.crossOrigin='anonymous';
        img.onload=function(){
          try{
            // cover draw
            const ir=img.width/img.height;
            const cr=W/H;
            let sx=0,sy=0,sw=img.width,sh=img.height;
            if(ir>cr){ sh=img.height; sw=sh*cr; sx=(img.width-sw)/2; }
            else{ sw=img.width; sh=sw/cr; sy=(img.height-sh)/2; }
            ctx.drawImage(img,sx,sy,sw,sh,0,0,W,H);
            // overlay gradient
            const grad=ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,'rgba(20,15,10,0.35)');
            grad.addColorStop(1,'rgba(20,15,10,0.6)');
            ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
            drawCardText(ctx,r,W,H);
            finalizeExport(canvas,r);
          }catch(e){ exportFallback(ctx,r,W,H,canvas,finalizeExport); }
        };
        img.onerror=function(){ exportFallback(ctx,r,W,H,canvas,finalizeExport); };
        img.src=r.coverImage;
      }else{
        exportFallback(ctx,r,W,H,canvas,finalizeExport);
      }
    }catch(e){ toast('导出失败','error'); }
  },100);
}
function exportFallback(ctx,r,W,H,canvas,done){
  // gradient bg
  const presets={
    sunset:['#f5a07b','#e86b4f'], ocean:['#7bb5d4','#4a7a9a'],
    forest:['#8ab880','#4f7a48'], dusk:['#c895a0','#8a5c7a']
  };
  let colors=presets[r.coverPreset]||['#f7f3ed','#e0d8cb'];
  if(settings.theme==='night') colors=['#2c2c33','#1a1a1f'];
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,colors[0]); g.addColorStop(1,colors[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawCardText(ctx,r,W,H);
  done(canvas,r);
}
function drawCardText(ctx,r,W,H){
  const isDark=settings.theme==='night'||r.coverImage||r.coverPreset;
  const textColor = r.coverImage||r.coverPreset ? '#f5f0ea' : (isDark?'#eae8e3':'#2c2520');
  const subColor = r.coverImage||r.coverPreset ? 'rgba(255,255,255,.75)' : (isDark?'#a8a59d':'#6b5f54');
  const accentColor = r.coverImage||r.coverPreset ? '#f5e6c8' : (isDark?'#d8b872':'#b8553f');
  // Kind badge
  ctx.fillStyle=accentColor;
  ctx.font='500 20px "Noto Sans SC","PingFang SC",sans-serif';
  const kindText=kindLabel(r.recordKind);
  ctx.fillText(kindText,48,80);
  // Title
  ctx.fillStyle=textColor;
  ctx.font='700 36px "Noto Serif SC","Songti SC",serif';
  wrapText(ctx,r.title||'（无标题）',48,130,W-96,48);
  // Notes
  if(r.notes){
    ctx.fillStyle=subColor;
    ctx.font='400 22px "Noto Sans SC",sans-serif';
    wrapText(ctx,r.notes,48,230,W-96,30);
  }
  // Date
  if(r.dateKey){
    ctx.fillStyle=subColor;
    ctx.font='400 20px "Noto Sans SC",sans-serif';
    ctx.fillText(recordDateDisplay(r),48,H-60);
  }
  // Countdown
  const cd=getCountdown(r);
  if(cd!=null){
    ctx.fillStyle=accentColor;
    ctx.font='700 56px "Noto Serif SC",serif';
    const cdText=cd===0?'就是今天':('还有 '+cd+' 天');
    ctx.textAlign='right';
    ctx.fillText(cdText,W-48,H-60);
    ctx.textAlign='left';
  }
  // Footer brand
  ctx.fillStyle=subColor;
  ctx.font='400 16px "Noto Sans SC",sans-serif';
  ctx.textAlign='right';
  ctx.fillText('时刻 · Shike',W-48,40);
  ctx.textAlign='left';
}
function wrapText(ctx,text,x,y,maxW,lh){
  const chars=(text||'').split('');
  let line='', cy=y;
  for(let i=0;i<chars.length;i++){
    const test=line+chars[i];
    if(ctx.measureText(test).width>maxW){
      ctx.fillText(line,x,cy);
      line=chars[i]; cy+=lh;
      if(cy>420) break;
    }else line=test;
  }
  if(line && cy<=420) ctx.fillText(line,x,cy);
}
function finalizeExport(canvas,r){
  try{
    const url=canvas.toDataURL('image/png');
    const a=document.createElement('a');
    const safeTitle=(r.title||'record').replace(/[\\/:*?"<>|]/g,'_').slice(0,30);
    const datePart=r.dateKey||fmtDateKey(new Date());
    a.href=url; a.download='shike-'+safeTitle+'-'+datePart+'.png';
    document.body.appendChild(a); a.click(); a.remove();
    toast(t('exported'));
  }catch(e){ toast('导出失败','error'); }
}

   NOTIFICATIONS
   ============================================================ */
function requestNotificationPermission(){
  if(!('Notification' in window)){
    toast('当前浏览器不支持通知','warning'); return;
  }
  if(Notification.permission==='granted'){
    settings.notifPerm='granted'; saveSettings();
    toast(t('notifyEnabled')); renderMy(); return;
  }
  if(Notification.permission==='denied'){
    toast(t('notifyDenied'),'error'); return;
  }
  Notification.requestPermission().then(function(perm){
    settings.notifPerm=perm; saveSettings();
    if(perm==='granted'){ toast(t('notifyEnabled')); startNotifCheck(); }
    else toast(t('notifyDenied'),'warning');
    renderMy();
  }).catch(function(){ toast('请求通知权限失败','error'); });
}
function checkDueReminders(){
  if(document.hidden) return;
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const now=new Date();
  const nowKey=fmtDateKey(now);
  const nowHm=pad2(now.getHours())+':'+pad2(now.getMinutes());
  records.forEach(function(r){
    if(r.archived||r.notified||!r.hasReminder) return;
    if(!r.dateKey||!r.timeText) return;
    // Check if date matches and time is within last minute
    if(r.dateKey<=nowKey){
      // For yearly anniversaries, check next occurrence
      let targetKey=r.dateKey;
      if(r.yearly){
        const next=getNextOccurrence(r);
        if(next) targetKey=fmtDateKey(next);
      }
      if(targetKey===nowKey && r.timeText<=nowHm){
        notifyReminder(r);
        r.notified=true; saveRecords();
      }
    }
  });
}
function notifyReminder(r){
  try{
    const n=new Notification('时刻 · '+kindLabel(r.recordKind),{
      body:(r.title||'')+(r.timeText?' ('+fmtTimeCN(r.timeText)+')':''),
      tag:r.id,
    });
    n.onclick=function(){ window.focus(); n.close(); switchPage('home'); };
  }catch(e){}
}
function startNotifCheck(){
  if(notifTimer) clearInterval(notifTimer);
  notifTimer=setInterval(checkDueReminders,60000);
  checkDueReminders();
}

function exportBackup(){
  try{
    const data={
      appVersion:APP_VERSION,
      exportedAt:new Date().toISOString(),
      records:records,
      settings:settings,
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='shike-backup-'+fmtDateKey(new Date())+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast(t('exported'));
  }catch(e){ toast('导出失败','error'); }
}
function importBackupFile(file){
  if(!file) return;
  const fr=new FileReader();
  fr.onload=function(){
    try{
      const data=JSON.parse(String(fr.result||''));
      if(!data||!Array.isArray(data.records)){ toast('备份文件格式无效','error'); return; }
      const existingIds=new Set(records.map(r=>r.id));
      let added=0;
      data.records.forEach(function(r){
        if(!r.id) r.id=uid();
        if(existingIds.has(r.id)){ r.id=uid(); }
        records.push(migrateRecord(r));
        added++;
      });
      if(data.settings && typeof data.settings==='object'){
        Object.assign(settings,data.settings);
      }
      saveRecords(); saveSettings();
      toast('已恢复 '+added+' 条记录');
      applyTheme(settings.theme||'paper');
      renderAll(); renderHome(); renderCalendar(); renderCalSelected(); renderImport(); renderMy();
    }catch(e){ toast('读取备份失败','error'); }
  };
  fr.onerror=function(){ toast('读取文件失败','error'); };
  fr.readAsText(file);
}
function clearAllData(){
  confirmDialog('清空数据','确定清空所有数据？此操作不可恢复。',function(){
    confirmDialog('再次确认','真的要清空所有数据吗？建议先导出备份。',function(){
      records=[];
      saveRecords();
      toast(t('cleared'));
      renderAll(); renderHome(); renderCalendar(); renderCalSelected(); renderImport(); renderMy();
    });
  });
}

      const id=card.dataset.id; if(!id) return;
      const actionEl=e.target.closest('[data-action]');

        updateBatchBar();
        actionEl.classList.toggle('checked',ui.selectedIds.has(id));
        card.classList.toggle('selected',ui.selectedIds.has(id));

          ui.selectedIds.add(id);
          renderAll();
        }
      },500);
    },{passive:true});

    el.addEventListener('touchmove',()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }});
  });

  });
  b('calNext','click',()=>{
    ui.calMonth++; if(ui.calMonth>11){ ui.calMonth=0; ui.calYear++; }
    renderCalendar();
  });
  b('calTodayBtn','click',()=>{

    ui.calYear=now.getFullYear();

    ui.calSelectedDate=fmtDateKey(now);

function saveFromDrawer(){
  const title=$('#drawerTitleInput').value.trim();
  const notes=$('#drawerNotes').value.trim();
  const dateKey=$('#drawerDate').value||null;
  const timeText=$('#drawerTime').value||null;
  const yearly=$('#drawerYearly').checked;
  let kind='note';
  const activeKind=$$('.kind-btn').find(function(b){return b.classList.contains('active')});
  if(activeKind) kind=activeKind.dataset.kind;
  const hasReminder = !!(timeText && (kind==='reminder'));
  let dateText='';
  if(dateKey) dateText=fmtDateCN(dateKey);
  if(dateKey&&timeText) dateText=fmtDateCN(dateKey)+' '+fmtTimeCN(timeText);
  else if(timeText) dateText=fmtTimeCN(timeText);

  const data={
    title:title||notes||'（无标题）',
    notes:notes,
    recordKind:kind,
    dateKey:dateKey,
    timeText:timeText,
    yearly:yearly,
    hasReminder:hasReminder,
    coverImage:ui._editCoverImage,
    coverPreset:ui._editPreset,
    isLarge:ui._editIsLarge,
    dateText:dateText,
    rawText:[title,notes].filter(Boolean).join(' '),
  };
  if(ui.editingId){
    updateRecord(ui.editingId,data);
  }else{
    addRecord(data);
  }
  toast(t('saved'));
  closeDrawer();
  refreshAll();
}

function registerSW(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            toast('已更新新版本，刷新即可生效');
          }
        });
      });
    }).catch(function(){});
  }
}

  }else if(settings.notifPerm==='granted' && 'Notification' in window && Notification.permission!=='granted'){
    settings.notifPerm=Notification.permission; saveSettings();
  }
  registerSW();
}
