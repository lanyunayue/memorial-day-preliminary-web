  min-width: 180px;
  position: relative;
}
.search-box input { padding-left: 34px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
.reminder-list { display: flex; flex-direction: column; gap: 10px; }
.reminder-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.15s;
}
.reminder-item:hover { box-shadow: var(--shadow-md); border-color: var(--accent-terracotta); transform: translateX(2px); }
.reminder-item.completed { opacity: 0.55; }
.reminder-item.completed .reminder-title { text-decoration: line-through; }
.reminder-date-col {
  text-align: center;
  min-width: 56px;
  padding: 8px 6px;
  background: var(--bg-cream);
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
.reminder-date-day { font-size: 22px; font-weight: 700; color: var(--accent-terracotta-deep); line-height: 1; }
.reminder-date-month { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
.reminder-body { flex: 1; min-width: 0; }
.reminder-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.reminder-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.reminder-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* ========== Schedule View ========== */
.schedule-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-paper); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-subtle); width: fit-content; }
.schedule-tab { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.schedule-tab.active { background: var(--accent-terracotta); color: #fff; font-weight: 600; }
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content:''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--border-subtle); }
.timeline-group { margin-bottom: 20px; }
.timeline-date {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-terracotta-deep);
  margin-bottom: 10px;
  position: relative;
}
.timeline-date::before {
  content: '';
  position: absolute;
  left: -22px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent-terracotta);
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent-terracotta);
}
.timeline-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 8px;
  margin-left: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.15s;
}
.timeline-item:hover { box-shadow: var(--shadow-sm); border-color: var(--accent-terracotta); }
.timeline-time {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-terracotta);
  min-width: 52px;
  flex-shrink: 0;
}
.timeline-content { flex: 1; }
.timeline-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.timeline-meta { font-size: 11px; color: var(--text-muted); }

/* ========== Risk Center View ========== */
.risk-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.risk-group { margin-bottom: 20px; }
.risk-group h3 { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.risk-item {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.risk-item.high { border-left: 3px solid var(--accent-red); }
.risk-item.mid { border-left: 3px solid var(--accent-amber); }
.risk-item.low { border-left: 3px solid var(--accent-blue); }
.risk-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.risk-body { flex: 1; }
.risk-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
.risk-reason { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 6px; }
.risk-advice { font-size: 11px; color: var(--accent-moss-deep); background: rgba(125,143,117,0.08); padding: 6px 10px; border-radius: var(--radius-sm); }
.risk-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* ========== TimeCard Workshop ========== */
.card-workshop { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
.card-preview-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.timecard-preview {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 3/4;
  border-radius: var(--radius-xl);
  padding: 24px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.timecard-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(155deg, rgba(255,255,255,0.15), transparent 60%);
  pointer-events: none;
}
.tc-theme-exam { background: linear-gradient(160deg, #3B5998, #1E3A8A); color: #fff; }
.tc-theme-birthday { background: linear-gradient(160deg, #F9A8D4, #EC4899); color: #fff; }
.tc-theme-finance { background: linear-gradient(160deg, #A78BFA, #7C3AED); color: #fff; }
.tc-theme-health { background: linear-gradient(160deg, #6EE7B7, #059669); color: #fff; }
.tc-theme-code { background: linear-gradient(160deg, #334155, #0F172A); color: #F1F5F9; }
.tc-theme-travel { background: linear-gradient(160deg, #67E8F9, #0891B2); color: #fff; }
.tc-top { display: flex; justify-content: space-between; align-items: flex-start; }
.tc-cat {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  background: rgba(255,255,255,0.2);
  border-radius: var(--radius-pill);
  backdrop-filter: blur(8px);
}
.tc-date { font-size: 11px; opacity: 0.8; }
.tc-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
.tc-days { font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.tc-unit { font-size: 18px; font-weight: 600; opacity: 0.9; }
.tc-title { font-size: 22px; font-weight: 700; margin-top: 8px; }
.tc-bottom {
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.15);
  font-size: 11px;
  opacity: 0.85;
  line-height: 1.6;
}
.theme-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.theme-dot {
  padding: 8px;
  border-radius: var(--radius-md);
  border: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  background: var(--bg-paper);
}
.theme-dot:hover { transform: scale(1.05); }
.theme-dot.active { border-color: var(--accent-terracotta); }
.theme-dot-swatch { width: 28px; height: 28px; border-radius: 50%; margin: 0 auto 4px; box-shadow: var(--shadow-sm); }
.theme-dot-name { font-size: 10px; color: var(--text-secondary); font-weight: 500; }
.workshop-controls { display: flex; flex-direction: column; gap: 14px; }
.reminder-picker { width: 100%; padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: var(--bg-paper); font-size: 13px; }

/* ========== Platform View ========== */
.platform-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.platform-card {
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.platform-card h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.platform-card ul { font-size: 12px; color: var(--text-secondary); line-height: 2; }
.platform-card li { padding-left: 14px; position: relative; }
.platform-card li::before { content: '·'; position: absolute; left: 0; color: var(--accent-terracotta); font-weight: 700; }
.platform-badge { font-size: 10px; padding: 2px 8px; border-radius: var(--radius-pill); font-weight: 700; margin-left: 6px; }
.badge-native { background: rgba(125,143,117,0.12); color: var(--accent-moss-deep); }
.badge-pwa { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.badge-mock { background: rgba(217,119,6,0.1); color: var(--accent-amber); }
.badge-limit { background: rgba(220,38,38,0.08); color: var(--accent-red); }

/* ========== TRAE View ========== */
.trae-session-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.trae-session-item {
  padding: 12px 16px;
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--text-secondary);
  font-family: 'SF Mono', Menlo, Consolas, monospace;
}

/* ========== Detail Drawer ========== */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,36,30,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  animation: fadeIn 0.2s;
}
.drawer-overlay.open { display: flex; justify-content: flex-end; }
.drawer {
  width: 420px;
  max-width: 92vw;
  height: 100%;
  background: var(--bg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  animation: slideInRight 0.28s ease;
  overflow-y: auto;
}
@keyframes slideInRight { from{transform:translateX(100%);}to{transform:translateX(0);} }
.drawer-head {
  padding: 20px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
}
.drawer-title { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.3; margin-bottom: 6px; }
.drawer-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
.drawer-close { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-muted); flex-shrink: 0; }
.drawer-close:hover { background: var(--bg-cream); color: var(--text-primary); }
.drawer-section { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
.drawer-section h4 { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.drawer-countdown { font-size: 36px; font-weight: 800; color: var(--accent-terracotta); line-height: 1; }
.drawer-countdown-unit { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-left: 4px; }
.drawer-field { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
.drawer-field-key { color: var(--text-muted); }
.drawer-field-val { color: var(--text-primary); font-weight: 600; text-align: right; max-width: 60%; }
.drawer-agent-msg {
  background: rgba(125,143,117,0.08);
  border-left: 3px solid var(--accent-moss);
  padding: 12px 14px;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.8;
  font-style: italic;
}
.drawer-prep-list { font-size: 13px; color: var(--text-secondary); line-height: 2; }
.drawer-source { font-size: 12px; color: var(--text-muted); background: var(--bg-cream); padding: 10px 12px; border-radius: var(--radius-md); line-height: 1.7; max-height: 100px; overflow-y: auto; }
.drawer-actions {
  padding: 16px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: auto;
  background: var(--bg);
  position: sticky;
  bottom: 0;
  border-top: 1px solid var(--border-subtle);
}

/* ========== Toast ========== */
.toast-container { position: fixed; top: 60px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast {
  background: var(--text-primary);
  color: #fff;
  padding: 12px 18px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  max-width: 320px;
  pointer-events: auto;
  cursor: pointer;
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.6;
}
@keyframes toastIn { from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);} }
.toast.removing { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut { to{opacity:0;transform:translateX(30px);} }
.toast-icon { font-size: 18px; flex-shrink: 0; }
.toast-close { margin-left: auto; font-size: 16px; opacity: 0.6; flex-shrink: 0; }
.toast-close:hover { opacity: 1; }

/* ========== Welcome / Onboarding ========== */
.welcome-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.welcome-card {
  position: relative;
  background: var(--bg-paper);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  max-width: 440px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.welcome-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent-terracotta), var(--accent-moss));
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px; font-weight: 800;
  margin: 0 auto 20px;
  box-shadow: var(--shadow-md);
}
.welcome-title { font-size: 28px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; text-align: center; letter-spacing: -0.5px; }
.welcome-subtitle { font-size: 15px; font-weight: 600; color: var(--accent-terracotta); margin-bottom: 14px; text-align: center; }
.welcome-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px; text-align: center; }
.welcome-identity { margin-bottom: 20px; text-align: left; }
.welcome-identity label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.welcome-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.welcome-hint { font-size: 11px; color: var(--text-muted); margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-subtle); line-height: 1.6; text-align: center; opacity: 0.8; }
.welcome-badge { position: absolute; top: 14px; right: 14px; font-size: 10px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border-subtle); padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.3px; }
.sidebar-version-badge { font-size: 10px; color: var(--text-muted); text-align: center; padding: 6px 8px; border-top: 1px solid var(--border-subtle); margin-top: 4px; opacity: 0.7; }

/* ========== Bottom Tab (mobile) ========== */
.bottom-tab { display: none; }

/* ========== Mobile menu button (hidden on desktop) ========== */
.menu-btn { display: none; }

/* ========== Guided Tour (60s flow) ========== */
.tour-highlight { position: relative; z-index: 150; }
.tour-pulse { animation: tourPulse 1.5s ease-in-out infinite; box-shadow: 0 0 0 4px rgba(196,112,78,0.3) !important; }
@keyframes tourPulse {
  0%,100%{box-shadow:0 0 0 4px rgba(196,112,78,0.3);}
  50%{box-shadow:0 0 0 10px rgba(196,112,78,0.15);}
}
.tour-tooltip {
  position: fixed;
  background: var(--text-primary);
  color: #fff;
  padding: 14px 18px;
  border-radius: var(--radius-md);
  font-size: 13px;
  max-width: 280px;
  z-index: 160;
  box-shadow: var(--shadow-lg);
  line-height: 1.6;
}
.tour-tooltip::after {
  content: '';
  position: absolute;
  border: 8px solid transparent;
}
.tour-tooltip-bottom::after { top: -16px; left: 24px; border-bottom-color: var(--text-primary); }
.tour-tooltip-top::after { bottom: -16px; left: 24px; border-top-color: var(--text-primary); }
.tour-next { margin-top: 10px; padding: 6px 14px; background: var(--accent-terracotta); color: #fff; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; }
.tour-skip { margin-top: 10px; margin-left: 8px; padding: 6px 12px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border-radius: var(--radius-sm); font-size: 12px; }

/* ========== Skeleton loading ========== */
.skeleton { background: linear-gradient(90deg, var(--bg-cream) 25%, rgba(196,112,78,0.06) 50%, var(--bg-cream) 75%); background-size: 200% 100%; animation: skeleton 1.4s infinite; border-radius: var(--radius-sm); }
@keyframes skeleton { 0%{background-position:200% 0;}100%{background-position:-200% 0;} }

/* ========== Mobile Responsive ========== */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); width: 260px; }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .main-area { margin-left: 0; }
  .menu-btn {
    display: inline-flex;
    width: 36px; height: 36px;
    align-items: center; justify-content: center;
    border-radius: var(--radius-md);
    font-size: 18px;
  }
  .menu-btn:hover { background: var(--bg-cream); }
  .sidebar-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 45;
    display: none;
  }
  .sidebar-overlay.open { display: block; }
  .bottom-tab {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(var(--bottomtab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--bg-elevated);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-subtle);
    z-index: 45;
    justify-content: space-around;
    align-items: center;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    transition: color 0.15s;
  }
  .tab-item.active { color: var(--accent-terracotta); }
  .tab-icon { font-size: 20px; }
  .view-container { padding: 16px; padding-bottom: calc(var(--bottomtab-h) + var(--safe-bottom) + 16px); }
  .view-title { font-size: 22px; }
  .dash-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 14px; }
  .stat-num { font-size: 24px; }
  .quick-actions { grid-template-columns: 1fr; gap: 8px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .inbox-layout { grid-template-columns: 1fr; height: auto; }
  .inbox-list { max-height: 220px; }
  .card-workshop { grid-template-columns: 1fr; }
  .platform-grid { grid-template-columns: 1fr; }
  .risk-overview { grid-template-columns: 1fr; }
  .drawer { width: 100%; max-width: 100%; }
  .status-bar { padding: 0 12px; gap: 8px; overflow-x: auto; }
  .status-item { font-size: 11px; white-space: nowrap; }
  .chat-layout { height: calc(100vh - var(--statusbar-h) - var(--bottomtab-h) - 40px); }
  .toast-container { top: 56px; right: 12px; left: 12px; }
  .toast { max-width: none; }
  .filter-bar { gap: 6px; }
  .filter-chip { padding: 5px 10px; font-size: 11px; }
}
@media (max-width: 480px) {
  .view-container { padding: 12px; padding-bottom: calc(var(--bottomtab-h) + var(--safe-bottom) + 12px); }
  .card, .card-glass { padding: 14px; }
  .welcome-card { padding: 24px 20px; }
}

/* ========== Premium Polish Overrides ========== */
/* Icon containers: reduce emoji rawness by adding subtle backdrop */
.quick-icon {
  width: 48px; height: 48px;
  margin: 0 auto 10px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  background: linear-gradient(135deg, rgba(196,112,78,0.1), rgba(125,143,117,0.1));
  transition: transform 0.25s;
}
.quick-action:hover .quick-icon { transform: scale(1.08) rotate(-3deg); }

/* Nav icons: subtle circle background on active */
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: background 0.15s;
}
.nav-item.active .nav-icon {
  background: rgba(196,112,78,0.15);
}

/* Tab icons: rounded bg when active */
.tab-icon {
  width: 32px; height: 24px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.tab-item.active .tab-icon {
  background: rgba(196,112,78,0.12);
  transform: translateY(-2px);
}
.tab-item { padding: 4px 0 6px; }
.tab-item.active { font-weight: 600; }

/* Toast: glass style, warmer, not pure black */
.toast {
  background: rgba(44,36,30,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  { regex: /今天/, h: function(){ var d=new Date(); return {year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()}; } },
  { regex: /(\d+)天后/, h: function(m){ var d=new Date(); d.setDate(d.getDate()+parseInt(m[1])); return {year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()}; } },
  { regex: /下个?月底/, h: function(){ var d=new Date(); d.setMonth(d.getMonth()+1,0); return {year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()}; } }
];
var TIME_PATTERNS = [
  { regex: /(上午|早上|凌晨|中午|下午|晚上)?(\d{1,2})[点时](?:(\d{1,2})分?)?(前)?/, h: function(m){ var t=formatTime(m[1],+m[2],m[3]?+m[3]:0); return m[4]==='前'?t+'前':t; } },
  { regex: /(\d{1,2}):(\d{2})/, h: function(m){ return pad(m[1])+':'+pad(m[2]); } }
];
var ACTION_KW = [
  { kw:'提交', cat:'材料提交', risk:'high' },
  { kw:'截止', cat:'截止日期', risk:'high' },
  { kw:'开会', cat:'会议', risk:'mid' },
  { kw:'班会', cat:'班会', risk:'mid' },
  { kw:'考试', cat:'考试', risk:'high' },
  { kw:'测验', cat:'测验', risk:'mid' },
  { kw:'讲座', cat:'讲座', risk:'low' },
  { kw:'体检', cat:'体检', risk:'mid' },
  { kw:'缴费', cat:'缴费', risk:'high' },
  { kw:'报名', cat:'报名', risk:'mid' },
  { kw:'材料', cat:'材料提交', risk:'mid' },
  { kw:'答辩', cat:'答辩', risk:'high' },
  { kw:'培训', cat:'培训', risk:'mid' },
  { kw:'活动', cat:'活动', risk:'low' },
  { kw:'生日', cat:'生日', risk:'low' },
  { kw:'房租', cat:'缴费', risk:'high' },
  { kw:'跑完', cat:'任务', risk:'mid' },
  { kw:'训练', cat:'训练', risk:'low' }
];
var GROUP_KW = ['全体','全班','所有同学','各班'];
var CLASS_RE = /([\u4e00-\u9fa5A-Za-z0-9]+?\d{2,4}[班]?|[\u4e00-\u9fa5]+?\d+班|[A-Z]组|\d+班|[\u4e00-\u9fa5]+专业)/g;
var PREP_MAP = {
  high: '建议提前 3 天准备，前一天确认材料，当天提前 15 分钟到场。',
  mid: '建议提前 1 天准备，当天准时参加。',
  low: '建议当天提前 10 分钟到达即可。'
};
function parseDate(text) {
  for (var i=0;i<DATE_PATTERNS.length;i++) {
    var m = text.match(DATE_PATTERNS[i].regex);
    if (m) { var r = DATE_PATTERNS[i].h(m); if (r) { var y=r.year||new Date().getFullYear(); return y+'-'+pad(r.month)+'-'+pad(r.day); } }
  }
  return '';
}
function parseTime(text) {
  for (var i=0;i<TIME_PATTERNS.length;i++) {
    var m = text.match(TIME_PATTERNS[i].regex);
    if (m) return TIME_PATTERNS[i].h(m);
  }
  return '';
}
function parseGroups(text) {
  var groups = [];
  for (var i=0;i<GROUP_KW.length;i++) if (text.indexOf(GROUP_KW[i])!==-1) groups.push(GROUP_KW[i]);
  var matches = text.match(CLASS_RE);
  if (matches) for (var j=0;j<matches.length;j++) if (groups.indexOf(matches[j])===-1) groups.push(matches[j]);
  return groups;
}
function parseAction(text) {
  for (var i=0;i<ACTION_KW.length;i++) if (text.indexOf(ACTION_KW[i].kw)!==-1) return ACTION_KW[i];
  var trimmed = text.replace(/^[\d\.\s、\-\*]+/,'').trim();
  return { kw: trimmed.substring(0,6), cat: trimmed.substring(0,10)||'事项', risk:'mid' };
}
function matchIdentity(groups, identity) {
  if (!identity) return true;
  var id = identity.trim(); if (!id) return true;
  for (var i=0;i<groups.length;i++) {
    var g = groups[i];
    if (g==='全体'||g==='全班'||g==='所有同学') return true;
    if (g.indexOf(id)!==-1 || id.indexOf(g)!==-1) return true;
  }
  return false;
}
function extractReminders(text, identity, source) {
  var drafts = [];
  var lines = text.split(/\n|；|;|。\s*/);
  for (var i=0;i<lines.length;i++) {
    var line = lines[i].trim(); if (line.length<4) continue;
    var clean = line.replace(/^[\d\.\s、\-\*]+/,'').trim(); if (clean.length<4) continue;
    var date = parseDate(clean), time = parseTime(clean), groups = parseGroups(clean), action = parseAction(clean);
    if (!date && !action.kw) continue;
    var title = buildTitle(clean, action);
    var relevant = matchIdentity(groups, identity);
    var confidence = date ? (time ? 0.85 : 0.72) : 0.45;
    if (!relevant) confidence *= 0.4;
    drafts.push({
      id: uid(), title: title, date: date||'待确认', time: time||'待确认',
      targetGroup: groups.length?groups.join('、'):'未明确', sourceText: clean, category: action.cat,
      riskLevel: action.risk, reminderSuggestion: date?('提前 '+(action.risk==='high'?'3天':action.risk==='mid'?'1天':'当天')+'提醒'):'建议手动设置日期',
      preparation: PREP_MAP[action.risk]||PREP_MAP.mid, confidence: confidence, relevant: relevant, selected: relevant,
      source: source||'文本解析'
    });
  }
  return drafts;
}
function buildTitle(clean, action) {
  // Remove leading list markers
  var s = clean.replace(/^[\d\.\s、\-\*]+/,'').trim();
  // Try to build a natural title around the action keyword
  var kwIdx = s.indexOf(action.kw);
  if (kwIdx>=0) {
    var before = s.substring(0, kwIdx).replace(/[，,。、；;]$/,'').trim();
    var after = s.substring(kwIdx+action.kw.length);
    // Remove location/result clauses from "after" to keep title short
    var cleanedAfter = after
      .replace(/^[至到在了的于给把]/,'')
      .replace(/(在|于)[A-Z0-9\u4e00-\u9fa5]{0,12}(室|厅|馆|楼|办|地点|地方).*$/,'')
      .replace(/[，,。；;].*$/,'')
      .replace(/请.*$/,'')
      .replace(/务必.*$/,'')
      .replace(/准时参加.*$/,'')
      .replace(/参加.*$/,'')
      .trim();
    if (before.length>0 && cleanedAfter.length>0 && cleanedAfter.length<15) {
      return before + action.kw + cleanedAfter;
    }
    if (cleanedAfter.length>0 && cleanedAfter.length<15) {
      return action.kw + cleanedAfter;
    }
    if (before.length>0 && before.length<15) {
      return before + action.kw;
    }
  }
  // Fallback: strip location markers and trailing punctuation, take up to 18 chars
  var title = s
    .replace(/[，,。；;！!？?].*$/,'')
    .replace(/(在|于)[A-Z][0-9]{3}.*$/,'')
    .replace(/请.*$/,'')
    .substring(0,18);
  return title;
}
function daysUntil(dateStr) {
  if (!dateStr || dateStr==='待确认') return 999;
  var parts = dateStr.split('-'); if (parts.length<3) return 999;
  var d = new Date(+parts[0],+parts[1]-1,+parts[2]);
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function daysUntilLabel(dateStr) {
  var d = daysUntil(dateStr);
  if (d<0) return '已逾期';
  if (d===0) return '今天';
  if (d===1) return '明天';
  if (d<=7) return d+'天后';
  return d+'天后';
}

// ========== Chat Agent Response Logic ==========
function agentReply(userText) {
  var date = parseDate(userText), time = parseTime(userText), action = parseAction(userText), groups = parseGroups(userText);
  var title = buildTitle(userText, action);
  var reply = { text: '', parsed: null, canSave: false };
  if (date || action.kw) {
    reply.canSave = true;
    var catName = action.cat;
    var riskLabel = action.risk==='high'?'高风险':action.risk==='mid'?'中风险':'低风险';
    reply.parsed = {
      title: title, date: date||'待确认', time: time||'待确认', category: catName,
      targetGroup: groups.length?groups.join('、'):(appState.identity||'个人'), riskLevel: action.risk,
      reminderSuggestion: date?('提前 '+(action.risk==='high'?'3天':action.risk==='mid'?'1天':'当天')+'提醒'):'建议手动确认日期',
      preparation: PREP_MAP[action.risk]||PREP_MAP.mid, source: 'Agent 对话', sourceText: userText
    };
    var dateStr = date ? ('📅 ' + date + (time?' '+time:'')) : '⚠️ 未识别到具体日期，请补充';
    reply.text = '我识别到一个' + catName + '事项：\n\n' +
      '• 事项：' + title + '\n' +
      '• ' + dateStr + '\n' +
      '• 场景：' + catName + '\n' +
      '• 风险：' + riskLabel + '\n' +
      '• 建议：' + reply.parsed.reminderSuggestion + '\n' +
      '• 准备：' + reply.parsed.preparation + '\n\n' +
      '是否保存为提醒草稿？';
  } else {
    // General conversation
    var greetings = /你好|您好|hi|hello|在吗/i;
    if (greetings.test(userText)) {
      reply.text = '你好！我是 Memorial day AI 时间整理 Agent。\n\n你可以：\n• 直接告诉我事项，如"明天下午3点开班会"\n• 粘贴通知文本让我提取与你有关的提醒\n• 上传TXT文件解析\n\n当前身份：' + (appState.identity||'未设置（点击右上角⚙️设置）');
    } else if (/重置|清空|清除/.test(userText)) {
      reply.text = '如果要重置所有数据，请在左侧导航底部找到"重置 Demo"按钮。这会清空所有提醒和对话记录。';
    } else if (/你是谁|你能做什么|功能/.test(userText)) {
      reply.text = '我是 AI 时间整理 Agent，可以帮你：\n1. 语音/文字输入快速创建提醒\n2. 解析通知文本，筛选与你有关的事项\n3. 生成提醒草稿、准备清单、风险评级\n4. 管理你的日程和时光卡片\n\n当前为 Web/PWA Demo，使用本地规则 + 示例 AI 流程模拟。';
    } else {
      reply.text = '我暂时没能识别出明确的时间事项。你可以试试说：\n• "明天下午三点开班会"\n• "下周三交创新创业材料"\n• "7月5日考试"\n• "妈妈生日还有20天"\n\n也可以去"通知收件箱"加载示例通知包体验批量解析。';
    }
  }
  return reply;
}

function resetVoiceState() {
  voiceListening = false;
  var btn = document.getElementById('chatMicBtn');
  if (btn) { btn.classList.remove('listening'); btn.disabled = false; }
}
function toggleChatVoice(e) {
  if (e) e.preventDefault();
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    showToast('⚠️','当前浏览器不支持语音识别，请使用 Chrome/Edge 或直接文字输入');
    resetVoiceState();
    return;
  }
  var btn = document.getElementById('chatMicBtn');
  if (!btn) return;
  if (!voiceRecognition) {
    try {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SR();
      voiceRecognition.lang = 'zh-CN';
      voiceRecognition.continuous = false;
      voiceRecognition.interimResults = false;
      voiceRecognition.onresult = function(ev) {
        try {
          var text = ev.results[0][0].transcript;
          var inp = document.getElementById('chatInput');
          if (inp) { inp.value = text; inp.focus(); autoResizeChat(inp); }
        } catch(err) {}
      };
      voiceRecognition.onend = function() { resetVoiceState(); };
      voiceRecognition.onerror = function(ev) {
        resetVoiceState();
        var errMsg = '语音识别未启动';
        if (ev && ev.error) {
          if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') errMsg = '麦克风权限被拒绝，请使用文字输入';
          else if (ev.error === 'no-speech') errMsg = '未检测到语音，请靠近麦克风再试';
          else if (ev.error === 'network') errMsg = '语音服务网络不可用，请使用文字输入';
        }
        showToast('🎤', errMsg);
      };
    } catch(err) {
      resetVoiceState();
      showToast('⚠️','语音初始化失败，请使用文字输入');
      return;
    }
  }
  if (voiceListening) {
    try { voiceRecognition.stop(); } catch(err) {}
    resetVoiceState();
  } else {
    try {
      voiceRecognition.start();
      voiceListening = true;
      btn.classList.add('listening');
    } catch(err) {
      // If start fails because recognition is already started, stop then restart
      try { voiceRecognition.stop(); } catch(e) {}
      resetVoiceState();
      setTimeout(function(){
        try {
          voiceRecognition.start();
          voiceListening = true;
          var b2 = document.getElementById('chatMicBtn');
          if (b2) b2.classList.add('listening');
        } catch(e2) { resetVoiceState(); }
      }, 200);
    }
  }
}

function renderReminders() {

  if (activeReminderFilter==='today') filtered = filtered.filter(function(r){return !appState.completedIds.includes(r.id) && daysUntil(r.date)===0;});
  else if (activeReminderFilter==='week') filtered = filtered.filter(function(r){var d=daysUntil(r.date);return !appState.completedIds.includes(r.id) && d>=0 && d<=7;});
  else if (activeReminderFilter==='high') filtered = filtered.filter(function(r){return r.riskLevel==='high' && !appState.completedIds.includes(r.id);});
  else if (activeReminderFilter==='completed') filtered = filtered.filter(function(r){return appState.completedIds.includes(r.id);});
  else filtered = filtered.filter(function(r){return !appState.completedIds.includes(r.id);});
  if (reminderSearchQuery) filtered = filtered.filter(function(r){return r.title.indexOf(reminderSearchQuery)!==-1 || r.category.indexOf(reminderSearchQuery)!==-1;});

function renderSchedule() {
  var active = appState.activeView==='schedule'?' active':'';
  var html = '<div class="view'+active+'" id="view-schedule">';
  html += '<div class="view-header"><div class="view-title">日程视图</div><div class="view-subtitle">按时间查看你的安排</div></div>';
  html += '<div class="schedule-tabs">';
  var tabs = [{id:'today',label:'今日'},{id:'week',label:'本周'},{id:'month',label:'本月'}];
  for (var i=0;i<tabs.length;i++) html += '<div class="schedule-tab'+(activeScheduleTab===tabs[i].id?' active':'')+'" onclick="activeScheduleTab=\''+tabs[i].id+'\';renderApp()">'+tabs[i].label+'</div>';
  html += '</div>';
  var items = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id);});
  var groups = {};
  var now = new Date();
  for (var j=0;j<items.length;j++) {
    var r = items[j];
    var d = daysUntil(r.date);
    var include = false;
    if (activeScheduleTab==='today') include = (d===0);
    else if (activeScheduleTab==='week') include = (d>=0 && d<=7);
    else if (activeScheduleTab==='month') include = (d>=0 && d<=31);
    if (include) {
      var key = r.date || '待确认';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    }
  }
  var keys = Object.keys(groups).sort();
  if (keys.length===0) {
    html += '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">当前视图没有事项。</div><button class="btn btn-primary" onclick="loadSamplePack()">📦 加载示例</button></div>';
  } else {
    html += '<div class="timeline">';
    for (var k=0;k<keys.length;k++) {
      var key = keys[k];
      var label = key;
      var dd = daysUntil(key);
      if (dd===0) label += ' (今天)'; else if (dd===1) label += ' (明天)'; else if (dd>=0) label += ' ('+dd+'天后)';
      html += '<div class="timeline-group"><div class="timeline-date">'+esc(label)+'</div>';
      for (var m=0;m<groups[key].length;m++) {
        var r = groups[key][m];
        var riskCls = r.riskLevel==='high'?'border-left:3px solid var(--accent-red);':r.riskLevel==='mid'?'border-left:3px solid var(--accent-amber);':'border-left:3px solid var(--accent-blue);';
        html += '<div class="timeline-item" style="'+riskCls+'" onclick="openDrawer(\''+r.id+'\')">';
        html += '<div class="timeline-time">'+(r.time&&r.time!=='待确认'?esc(r.time):'全天')+'</div>';
        html += '<div class="timeline-content"><div class="timeline-title">'+esc(r.title)+'</div><div class="timeline-meta"><span class="tag tag-cat">'+esc(r.category)+'</span> · '+esc(r.source||'')+'</div></div>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ---------- Risk Center ----------
function computeRisks() {
  var active = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id);});
  var highCats = ['考试','缴费','材料提交','答辩','截止日期'];
  var risks = { overdue:[], today:[], nearFuture:[], conflict:[], noTime:[], highCat:[] };
  for (var i=0;i<active.length;i++) {
    var r = active[i];
    var d = daysUntil(r.date);
    if (d<0) risks.overdue.push(r);
    else if (d===0) risks.today.push(r);
    else if (d<=3) risks.nearFuture.push(r);
    if (!r.time || r.time==='待确认') risks.noTime.push(r);
    if (highCats.indexOf(r.category)!==-1) risks.highCat.push(r);
  }
  // Conflict detection
  var dateMap = {};
  for (var j=0;j<active.length;j++) {
    var r2 = active[j]; if(!r2.date||r2.date==='待确认') continue;
    if (!dateMap[r2.date]) dateMap[r2.date] = [];
    dateMap[r2.date].push(r2);
  }
  for (var k in dateMap) if (dateMap[k].length>1) risks.conflict.push({date:k,items:dateMap[k]});
  risks.high = [].concat(risks.overdue, risks.nearFuture.filter(function(r){return r.riskLevel==='high';}));
  return risks;
}
function renderRisk() {
  var active = appState.activeView==='risk'?' active':'';
  var risks = computeRisks();
  var html = '<div class="view'+active+'" id="view-risk">';
  html += '<div class="view-header"><div class="view-title">风险中心</div><div class="view-subtitle">Agent 自动分析你的提醒风险</div></div>';
  html += '<div class="risk-overview">';
  html += '<div class="stat-card danger"><div class="stat-num">'+risks.overdue.length+'</div><div class="stat-label">已逾期</div></div>';
  html += '<div class="stat-card warning"><div class="stat-num">'+risks.today.length+'</div><div class="stat-label">今天事项</div></div>';
  html += '<div class="stat-card primary"><div class="stat-num">'+risks.nearFuture.length+'</div><div class="stat-label">3天内事项</div></div>';
  html += '</div>';
  function riskBlock(level, icon, title, items, advice, renderFn) {
    if (!items || items.length===0) return '';
    var cls = level==='high'?'high':level==='mid'?'mid':'low';
    var h = '<div class="risk-group"><h3>'+icon+' '+title+' ('+items.length+')</h3>';
    for (var i=0;i<items.length;i++) h += renderFn(items[i], cls);
    h += '</div>';
    return h;
  }
  function renderRiskItem(r, cls) {
    return '<div class="risk-item '+cls+'"><div class="risk-icon">⚠️</div><div class="risk-body"><div class="risk-title">'+esc(r.title)+'</div><div class="risk-reason">'+esc(r.date)+(r.time?' '+esc(r.time):'')+' · '+esc(r.category)+' · 剩余 '+daysUntilLabel(r.date)+'</div><div class="risk-advice">💡 '+esc(PREP_MAP[r.riskLevel]||PREP_MAP.mid)+'</div></div><div class="risk-actions"><button class="btn-icon btn-ghost" onclick="openDrawer(\''+r.id+'\')">→</button></div></div>';
  }
  html += riskBlock('high','🚨','已逾期事项',risks.overdue,'尽快处理',renderRiskItem);
  html += riskBlock('mid','📅','今天事项',risks.today,'今日完成',renderRiskItem);
  html += riskBlock('mid','⏰','未来3天事项',risks.nearFuture,'提前准备',renderRiskItem);
  html += riskBlock('mid','📌','高风险类别',risks.highCat.filter(function(r){return risks.overdue.indexOf(r)===-1 && risks.nearFuture.indexOf(r)===-1;}),'重点关注',renderRiskItem);
  if (risks.noTime.length>0) {
    html += '<div class="risk-group"><h3>❓ 缺少具体时间的事项 ('+risks.noTime.length+')</h3>';
    for (var n=0;n<risks.noTime.length;n++) html += renderRiskItem(risks.noTime[n],'low');
    html += '</div>';
  }
  if (risks.conflict.length>0) {
    html += '<div class="risk-group"><h3>⚡ 同一天多个事项 ('+risks.conflict.length+'天)</h3>';
    for (var c=0;c<risks.conflict.length;c++) {
      var cf = risks.conflict[c];
      html += '<div class="risk-item mid"><div class="risk-icon">⚡</div><div class="risk-body"><div class="risk-title">'+esc(cf.date)+' 有 '+cf.items.length+' 个事项</div><div class="risk-reason">'+cf.items.map(function(i){return i.title;}).join('、')+'</div><div class="risk-advice">💡 注意时间冲突，建议提前规划顺序</div></div></div>';
    }
    html += '</div>';
  }
  var total = risks.overdue.length+risks.today.length+risks.nearFuture.length+risks.highCat.length+risks.noTime.length+risks.conflict.length;
  if (total===0) html += '<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">暂无风险事项，安排得井井有条！</div></div>';
  html += '</div>';
  return html;
}

// ========== Toast ==========
function showToast(icon, text) {
  var container = document.getElementById('toastContainer'); if (!container) return;
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<span class="toast-icon">'+icon+'</span><span style="flex:1;">'+esc(text)+'</span><span class="toast-close" onclick="this.parentElement.classList.add(\'removing\');setTimeout(function(){this.parentElement.remove();}.bind(this),300)">✕</span>';
  el.onclick = function(e){ if(e.target.classList.contains('toast-close')) return; /* handle notification click */ };
  container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 4000);
}

function simulateNotification() {
  var active = appState.reminders.filter(function(r){return !appState.completedIds.includes(r.id) && daysUntil(r.date)<=3;});

  el.onclick = function(e){ if(e.target.closest('.toast-close')) return; openDrawer(r.id); };
  var container = document.getElementById('toastContainer'); container.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){if(el.parentNode)el.remove();},300); }, 6000);

  var existing = appState.reminders.map(function(r){return r.title;});
  for (var i=0;i<sampleReminders.length;i++) if (existing.indexOf(sampleReminders[i].title)===-1 && sampleReminders[i].relevant!==false) appState.reminders.push(sampleReminders[i]);
  for (var j=0;j<appState.inbox.length;j++) appState.inbox[j].status='unread';
  activeInboxId = appState.inbox[0].id; inboxDrafts=[];
  setStatus('busy','正在加载示例...');
  setTimeout(function(){ setStatus('ready','已加载示例通知包'); showToast('📦','已加载 '+appState.inbox.length+' 份示例通知和示例提醒'); renderApp(); },500);
}
function resetDemo() {
  if (!confirm('确定重置 Demo？这会清空所有提醒、对话和身份设置。')) return;
  localStorage.removeItem(STORAGE_KEY);
  appState = defaultState();
  activeInboxId=null; inboxDrafts=[]; activeScheduleTab='today'; activeReminderFilter='all'; reminderSearchQuery=''; activeCardTheme='exam'; selectedCardReminderId=null;
  hideWelcome();
  showToast('🔄','Demo 已重置');
  renderApp();
}

// ========== Guided Tour (60s flow) ==========
function startGuidedTour() {
  if (!appState.identity) appState.identity='3班';
  loadSamplePack();
  switchView('dashboard');
  showToast('▶️','60秒流程开始：先看工作台，然后会引导你依次体验');
  // For simplicity, just give a hint
  setTimeout(function(){ showToast('💡','打开"通知收件箱"查看示例通知，点击"AI 提取我的提醒"体验筛选'); },1500);
}

// ========== Helpers ==========
function esc(s) { if(s==null||s==undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){showToast('📋','已复制到剪贴板');},function(){prompt('复制以下内容：',text);});
  } else { prompt('复制以下内容：',text); }
}
function setStatus(mode, text) {
  var dot = document.getElementById('statusDot'); var txt = document.getElementById('statusText');
  if (dot) { dot.classList.remove('busy','error'); if(mode==='busy')dot.classList.add('busy'); if(mode==='error')dot.classList.add('error'); }
  if (txt) txt.textContent = text;
}
function toggleSidebar(open) {
  var sb = document.getElementById('sidebar'); var ov = document.getElementById('sidebarOverlay');
  if(!sb||!ov) return;
  if(open){sb.classList.add('open');ov.classList.add('open');} else {sb.classList.remove('open');ov.classList.remove('open');}
}

// ========== Init ==========
function init() {
  if (!appState.onboarded) showWelcome();
  else hideWelcome();
  activeInboxId = appState.inbox.length>0 ? appState.inbox[0].id : null;
  renderApp();
  // Register service worker if available
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
