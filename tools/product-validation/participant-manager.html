<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>时刻真实用户研究管理器</title>
<style>
body{margin:0;background:#f5f3ef;color:#25231f;font:14px/1.6 system-ui,sans-serif;letter-spacing:0}main{max-width:960px;margin:auto;padding:28px 18px}h1{font-size:24px}section{padding:16px 0;border-top:1px solid #d8d2c8}label{display:grid;gap:5px}input,select,button{min-height:38px;padding:7px 10px;border:1px solid #bdb5a8;border-radius:6px;background:#fff;color:inherit;font:inherit}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}pre{min-height:200px;padding:14px;overflow:auto;background:#fff;border:1px solid #d8d2c8;border-radius:6px;white-space:pre-wrap}.note{color:#69645c}</style>
</head>
<body><main>
<h1>时刻真实用户研究管理器</h1><p class="note">只导入参与者本人从 Validation Mode 导出的 JSON。此工具不生成参与者、反馈或留存数据。</p>
<section><h2>导入真实 session</h2><input id="files" type="file" accept="application/json,.json" multiple><p id="sourceCount"></p></section>
<section><h2>人工定性编码</h2><p class="note">只记录参与者代码、session 引用和问题分类。不要粘贴姓名、联系方式或完整生活原文。</p><div class="grid"><label>参与者代码<input id="codeParticipant"></label><label>Session ID<input id="codeSession"></label><label>问题分类<select id="issueCode"><option value="copy_confusion">文案困惑</option><option value="input_discovery">输入入口</option><option value="draft_mismatch">草稿不符</option><option value="edit_cost">修改成本</option><option value="waiting_value">Waiting For 价值</option><option value="next_action_value">下一步建议价值</option><option value="trust_loss">信任受损</option><option value="comparison_advantage">对比优势</option><option value="comparison_disadvantage">对比劣势</option><option value="return_motivation">再次使用动机</option><option value="return_barrier">再次使用障碍</option></select></label><label>严重度<select id="severity"><option value="medium">中</option><option value="low">低</option><option value="high">高</option><option value="critical">严重</option></select></label></div><div class="actions"><button id="addCode">加入人工编码</button></div><p id="codeCount"></p><p id="message" role="status"></p></section>
<section><h2>指标</h2><pre id="metrics"></pre><button id="exportStudy" disabled>导出研究工作包</button></section>
</main>
<script src="../../src/research/validation-metrics.js"></script><script src="session-analyzer.js"></script><script src="metrics-report.js"></script><script src="qualitative-coder.js"></script><script src="session-exporter.js"></script><script src="participant-manager.js"></script>
</body></html>
