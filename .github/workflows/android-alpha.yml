name: Android Alpha

on:
  push:
    branches: [program-v230a1-android-parcel]
  pull_request:
    paths:
      - 'apps/android/**'
      - 'packages/event-contract/**'
      - 'packages/parcel-domain/**'
      - 'packages/temporal-contract/**'
      - '*.gradle.kts'
      - 'gradle/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Install fixed Android SDK
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'
      - name: Verify JVM, Android unit, lint and APK
        run: ./gradlew :packages:event-contract:test :packages:temporal-contract:test :packages:parcel-domain:test :apps:android:app:testDebugUnitTest :apps:android:app:lintDebug :apps:android:app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: chronos-v230a1-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
