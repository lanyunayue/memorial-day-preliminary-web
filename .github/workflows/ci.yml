name: CI

on:
  push:
    branches: [main, 'program-*']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm run ci:install
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Detect browser
        id: browser_detect
        run: |
          echo "Checking for available browsers..."
          SHIKE_BROWSER_PATH=""
          for b in google-chrome google-chrome-stable chromium chromium-browser microsoft-edge microsoft-edge-stable; do
            if command -v $b >/dev/null 2>&1; then
              BP=$(command -v $b)
              BV=$($b --version 2>/dev/null || echo "version-unknown")
              echo "Found browser: $b at $BP ($BV)"
              SHIKE_BROWSER_PATH="$BP"
              echo "SHIKE_BROWSER_PATH=$BP" >> $GITHUB_ENV
              echo "browser_path=$BP" >> $GITHUB_OUTPUT
              echo "browser_version=$BV" >> $GITHUB_OUTPUT
              break
            fi
          done
          if [ -z "$SHIKE_BROWSER_PATH" ]; then
            echo "No browser found in PATH"
            exit 1
          fi
          echo "Selected browser: $SHIKE_BROWSER_PATH"
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npm run test:unit
      - name: Build product validation preview
        run: npm run build:validation-preview
      - name: Legacy regression
        run: npm run test:legacy
      - name: Parser regression
        run: node scripts/test-shike-sprite-create-intent.js
      - name: Chronos corpus
        run: node scripts/test-shike-temporal-corpus.js
      - name: Chronos property tests
        run: node scripts/test-shike-temporal-property.js
      - name: Chronos fault recovery
        run: node scripts/test-chronos-fault-recovery.js
      - name: Chronos migration
        run: node scripts/test-shike-storage-migration.js
      - name: Chronos conflict coverage
        run: node scripts/test-chronos-conflict-engine.js
      - name: Chronos memory and adaptation
        run: node scripts/test-chronos-temporal-memory.js && node scripts/test-chronos-adaptation.js
      - name: Accessibility
        run: npm run test:a11y
      - name: Security checks
        run: npm run test:security
      - name: CI gate regression
        run: npm run test:ci-gates
      - name: Test integrity
        run: npm run test:integrity
      - name: Playwright product truth
        run: npm run test:browser
      - name: Browser E2E
        id: browser_e2e
        run: npm run test:cdp
        env:
          SHIKE_BROWSER_PATH: ${{ steps.browser_detect.outputs.browser_path }}
          SHIKE_ARTIFACT_DIR: artifacts/ci-e2e
      - name: IndexedDB quota and stress
        id: stress_e2e
        run: node scripts/test-e2e-runner.js --required --autostart --stress-only --artifact-dir=artifacts/chronos-alpha2/stress
        env:
          SHIKE_BROWSER_PATH: ${{ steps.browser_detect.outputs.browser_path }}
      - name: Upload browser evidence
        if: always() && steps.browser_e2e.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence
          path: artifacts/ci-e2e/
          if-no-files-found: error
      - name: Upload product validation preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-validation-preview
          path: artifacts/product-validation/preview/
          if-no-files-found: error
      - name: Upload Chronos stress evidence
        if: always() && steps.stress_e2e.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: chronos-alpha2-stress
          path: artifacts/chronos-alpha2/stress/
          if-no-files-found: error
      - name: Static asset validation
        if: always()
        run: node scripts/test-shike-offline-assets.js
      - name: Service Worker validation
        if: always()
        run: node scripts/test-shike-pwa-assets.js
