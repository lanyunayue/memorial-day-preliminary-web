name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm run ci:install
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npm run test:unit
      - name: Legacy regression
        run: npm run test:legacy
      - name: Parser regression
        run: node scripts/test-shike-sprite-create-intent.js
      - name: Accessibility
        run: npm run test:a11y
      - name: Security checks
        run: npm run test:security
      - name: CI gate regression
        run: npm run test:ci-gates
      - name: Test integrity
        run: npm run test:integrity
      - name: Browser E2E
        id: browser_e2e
        run: npm run test:e2e -- --autostart --layout --artifact-dir=artifacts/ci-e2e
      - name: Upload browser evidence
        if: always() && (steps.browser_e2e.outcome == 'success' || steps.browser_e2e.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence
          path: artifacts/ci-e2e/
          if-no-files-found: warn
      - name: Static asset validation
        if: always()
        run: node scripts/test-shike-offline-assets.js
      - name: Service Worker validation
        if: always()
        run: node scripts/test-shike-pwa-assets.js
